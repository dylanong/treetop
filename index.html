<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Treetop Rescue — Pip &amp; the Glimmer Spirits</title>
<style>
  :root{ --bark:#4a3020; --night:#16261c; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent;
     -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html,body{ margin:0; height:100%; background:var(--night); overflow:hidden;
    font-family:"Trebuchet MS", Verdana, sans-serif; }
  #stage{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ display:block; width:min(100vw, calc(100vh * 16 / 9)); height:auto; aspect-ratio:16/9;
    background:#0d1a12; border-radius:6px; box-shadow:0 0 60px rgba(0,0,0,.6);
    image-rendering:auto; touch-action:none; }
  /* touch controls — shown on coarse pointers */
  #touch{ display:none; position:fixed; inset:auto 0 0 0; height:34vh; pointer-events:none;
    user-select:none; z-index:5; }
  @media (pointer:coarse){ #touch{ display:block; } }
  #touch button{
    position:absolute; pointer-events:auto; border:0; border-radius:50%;
    width:64px; height:64px; font-size:22px; font-weight:bold; color:#fff;
    background:rgba(40,60,45,.55); box-shadow:0 0 0 3px rgba(255,255,255,.25) inset;
    touch-action:none;
  }
  #touch button:active,#touch button.held{ background:rgba(140,170,110,.65); }
  /* safe-area aware: clears notches, curved corners and the home indicator */
  #touch{ --sab:env(safe-area-inset-bottom,0px);
          --sal:env(safe-area-inset-left,0px);
          --sar:env(safe-area-inset-right,0px); }
  /* left thumb: diamond D-pad (down included — needed to climb down ladders) */
  .t-left { left:calc(10px + var(--sal));  bottom:calc(58px + var(--sab)); }
  .t-right{ left:calc(142px + var(--sal)); bottom:calc(58px + var(--sab)); }
  .t-up   { left:calc(76px + var(--sal));  bottom:calc(112px + var(--sab)); }
  .t-down { left:calc(76px + var(--sal));  bottom:calc(8px + var(--sab)); }
  /* right thumb: jump big and closest, fire above, sprint inward */
  .t-jump { right:calc(16px + var(--sar)); bottom:calc(34px + var(--sab));
            width:78px; height:78px; background:rgba(178,108,80,.55); }
  .t-sprint{ right:calc(108px + var(--sar)); bottom:calc(20px + var(--sab)); }
  .t-fire { right:calc(30px + var(--sar)); bottom:calc(124px + var(--sab));
            background:rgba(200,150,60,.55); }
  button:focus-visible{ outline:3px solid #e3b258; outline-offset:2px; }
</style>
</head>
<body>
<div id="stage"><canvas id="game" width="960" height="540" aria-label="Treetop Rescue game"></canvas></div>
<div id="touch">
  <button class="t-left"  data-k="left"  aria-label="Move left">◀</button>
  <button class="t-right" data-k="right" aria-label="Move right">▶</button>
  <button class="t-up"    data-k="up"    aria-label="Climb up">▲</button>
  <button class="t-down"  data-k="down"  aria-label="Climb down">▼</button>
  <button class="t-sprint" data-k="sprint" aria-label="Sprint">S</button>
  <button class="t-jump"  data-k="jump"  aria-label="Jump">A</button>
  <button class="t-fire"  data-k="fire"  aria-label="Fire slingshot">◎</button>
</div>
<script>
"use strict";
/* =====================================================================
   TREETOP RESCUE — Pip & the Glimmer Spirits
   An original arcade climbing platformer. Vanilla JS + Canvas, no libs.
   Classes: Game, Player, Platform, Ladder, Hazard family, Boss family,
            Collectible, PowerUp, LevelBuilder, InputSys, AudioSys,
            Camera, Particles, UI helpers.
   ===================================================================== */

/* ---------------- utilities ---------------- */
const VW=960, VH=540, TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const aabb=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
const dist2=(x1,y1,x2,y2)=>{const dx=x1-x2,dy=y1-y2;return dx*dx+dy*dy;};
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------------- persistent save ---------------- */
const Save={
  get(k,d){ try{const v=localStorage.getItem("treetop-"+k); return v?JSON.parse(v):d;}catch(e){return d;} },
  set(k,v){ try{localStorage.setItem("treetop-"+k,JSON.stringify(v));}catch(e){} }
};

/* ---------------- input (keyboard + touch) ---------------- */
class InputSys{
  constructor(){
    this.k={}; this.touch={}; this.just=new Set();
    const map={arrowleft:"left",a:"left",arrowright:"right",d:"right",
      arrowup:"up",w:"up",arrowdown:"down",s:"down"," ":"jump",
      shift:"sprint",p:"pause",escape:"pause",enter:"enter",m:"mute",x:"fire",f:"fire"};
    addEventListener("keydown",e=>{
      const b=map[e.key.toLowerCase()]; if(!b)return;
      e.preventDefault();
      if(!this.k[b]){this.k[b]=1; this.just.add(b);}
    });
    addEventListener("keyup",e=>{const b=map[e.key.toLowerCase()]; if(b)this.k[b]=0;});
    document.querySelectorAll("#touch button").forEach(el=>{
      const b=el.dataset.k;
      el.addEventListener("pointerdown",e=>{e.preventDefault();el.setPointerCapture(e.pointerId);
        el.classList.add("held"); if(!this.touch[b])this.just.add(b); this.touch[b]=1;});
      const up=()=>{el.classList.remove("held"); this.touch[b]=0;};
      el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
    });
  }
  get(b){ return this.k[b]||this.touch[b]; }
  pressed(b){ return this.just.has(b); }
  endFrame(){ this.just.clear(); }
}

/* ---------------- audio: synthesized SFX + chip music ---------------- */
const NOTE=m=>440*Math.pow(2,(m-69)/12);
class AudioSys{
  constructor(){ this.ctx=null; this.sfxOn=true; this.musicOn=true;
    this.song=null; this.nextT=0; this.idx=0; this.gain=null; }
  boot(){ // must be called from a user gesture
    if(this.ctx)return;
    try{
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.gain=this.ctx.createGain(); this.gain.gain.value=0.5;
      this.gain.connect(this.ctx.destination);
    }catch(e){}
  }
  tone(f,d,type="square",v=.08,slide=0,when=0){
    if(!this.ctx||!this.sfxOn&&!when)return;
    try{
      const t=this.ctx.currentTime+when;
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type=type; o.frequency.setValueAtTime(f,t);
      if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t+d);
      g.gain.setValueAtTime(v,t);
      g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.connect(g).connect(this.gain); o.start(t); o.stop(t+d+.02);
    }catch(e){}
  }
  mtone(f,d,type,v,when){ // music voice (respects musicOn at schedule time)
    if(!this.ctx||!this.musicOn)return;
    this.sfxOn?this.tone(f,d,type,v,0,when):this.toneRaw(f,d,type,v,when);
  }
  toneRaw(f,d,type,v,when){ const s=this.sfxOn; this.sfxOn=true; this.tone(f,d,type,v,0,when); this.sfxOn=s; }
  sfx(n){
    const S={jump:()=>this.tone(300,.15,"square",.07,300),
      djump:()=>this.tone(420,.16,"square",.07,420),
      fruit:()=>this.tone(700,.09,"triangle",.09,200),
      gem:()=>{this.tone(880,.07,"square",.06);this.tone(1320,.12,"square",.06,0,.06);},
      coin:()=>{this.tone(988,.06,"square",.06);this.tone(1319,.14,"square",.06,0,.05);},
      power:()=>{[523,659,784,1047].forEach((f,i)=>this.tone(f,.1,"square",.07,0,i*.07));},
      hurt:()=>this.tone(180,.3,"sawtooth",.1,-120),
      stomp:()=>this.tone(240,.12,"square",.09,-140),
      check:()=>{this.tone(659,.1,"triangle",.08);this.tone(880,.18,"triangle",.08,0,.09);},
      crumble:()=>this.tone(120,.25,"sawtooth",.06,-60),
      shoot:()=>this.tone(520,.1,"square",.07,-260),
      plink:()=>this.tone(1500,.05,"triangle",.05,-500),
      door:()=>this.tone(500,.2,"sine",.08,240),
      bosshit:()=>this.tone(160,.25,"sawtooth",.12,-90),
      bossdie:()=>{[392,494,587,784,988].forEach((f,i)=>this.tone(f,.16,"square",.09,0,i*.09));},
      fanfare:()=>{[523,523,523,659,784,1047].forEach((f,i)=>this.tone(f,.16,"square",.09,0,i*.11));},
      buzz:()=>this.tone(220,.2,"sawtooth",.05,40),
      click:()=>this.tone(600,.05,"square",.05),
      splash:()=>this.tone(300,.2,"sine",.05,-200),
      spirit:()=>{[784,988,1175,1568].forEach((f,i)=>this.tone(f,.2,"sine",.08,0,i*.1));}
    };
    if(S[n])S[n]();
  }
  /* two looping chip tunes: cheerful canopy theme + tense boss theme */
  setSong(name){
    if(this.song===name)return;
    this.song=name; this.idx=0;
    if(this.ctx)this.nextT=this.ctx.currentTime+.1;
  }
  update(){
    if(!this.ctx||!this.song||!this.musicOn)return;
    const SONGS={
      main:{bpm:132, mel:[72,74,76,79,76,74,72,69, 67,69,72,76,74,72,69,67, 72,74,76,79,81,79,76,74, 72,76,74,71,72,0,72,0],
            bass:[48,0,52,0,55,0,52,0, 43,0,47,0,50,0,47,0, 48,0,52,0,55,0,57,0, 55,0,50,0,48,0,43,0]},
      boss:{bpm:150, mel:[69,0,69,72,69,0,68,0, 69,0,69,72,74,0,72,0, 65,0,65,68,65,0,64,0, 65,0,69,68,65,0,62,0],
            bass:[45,45,0,45,45,0,44,0, 45,45,0,45,45,0,41,0, 41,41,0,41,41,0,40,0, 41,41,0,45,44,0,38,0]}
    };
    const s=SONGS[this.song]; if(!s)return;
    const step=60/s.bpm/2;
    while(this.nextT<this.ctx.currentTime+.25){
      const i=this.idx%s.mel.length;
      const when=this.nextT-this.ctx.currentTime;
      if(s.mel[i])this.mtone(NOTE(s.mel[i]),step*.9,"square",.035,Math.max(0,when));
      if(s.bass[i])this.mtone(NOTE(s.bass[i]),step*.95,"triangle",.05,Math.max(0,when));
      this.nextT+=step; this.idx++;
    }
  }
}

/* ---------------- particles & floating score text ---------------- */
class Particles{
  constructor(){ this.list=[]; }
  emit(x,y,o={}){
    const n=o.n||8;
    for(let i=0;i<n;i++){
      const a=Math.random()*TAU, sp=(o.spd||120)*(0.3+Math.random()*.7);
      this.list.push({x,y,vx:Math.cos(a)*sp+(o.vx||0),vy:Math.sin(a)*sp+(o.vy||0),
        life:(o.life||.6)*(0.6+Math.random()*.6),max:1,
        size:(o.size||4)*(0.6+Math.random()*.8),
        color:Array.isArray(o.color)?o.color[(Math.random()*o.color.length)|0]:(o.color||"#fff"),
        grav:o.grav??300, glow:o.glow||false});
    }
  }
  update(dt){
    for(let i=this.list.length-1;i>=0;i--){
      const p=this.list[i];
      p.life-=dt; if(p.life<=0){this.list.splice(i,1);continue;}
      p.vy+=p.grav*dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    }
  }
  draw(c,cam){
    for(const p of this.list){
      c.globalAlpha=clamp(p.life*2,0,1);
      if(p.glow){c.shadowColor=p.color;c.shadowBlur=10;}
      c.fillStyle=p.color;
      c.beginPath(); c.arc(p.x,p.y-cam.y,p.size,0,TAU); c.fill();
      c.shadowBlur=0;
    }
    c.globalAlpha=1;
  }
}
class FloatTexts{
  constructor(){ this.list=[]; }
  add(x,y,txt,color="#fff"){ this.list.push({x,y,txt,color,life:1}); }
  update(dt){ for(let i=this.list.length-1;i>=0;i--){const t=this.list[i];
    t.life-=dt; t.y-=40*dt; if(t.life<=0)this.list.splice(i,1);} }
  draw(c,cam){
    c.textAlign="center"; c.font="bold 16px 'Trebuchet MS',sans-serif";
    for(const t of this.list){
      c.globalAlpha=clamp(t.life*1.5,0,1);
      c.fillStyle="#00000088"; c.fillText(t.txt,t.x+1,t.y-cam.y+1);
      c.fillStyle=t.color; c.fillText(t.txt,t.x,t.y-cam.y);
    }
    c.globalAlpha=1; c.textAlign="left";
  }
}

/* ---------------- camera with smoothing + shake ---------------- */
class Camera{
  constructor(){ this.y=0; this.ty=0; this.shakeT=0; this.shakeM=0; this.ox=0; this.oy=0; }
  shake(m,t){ if(!G.settings.shake)return; this.shakeM=Math.max(this.shakeM,m); this.shakeT=Math.max(this.shakeT,t); }
  update(dt,minY,maxY){
    this.ty=clamp(this.ty,minY,Math.max(minY,maxY));
    this.y=lerp(this.y,this.ty,1-Math.pow(.0012,dt));
    if(this.shakeT>0){ this.shakeT-=dt;
      this.ox=(Math.random()*2-1)*this.shakeM; this.oy=(Math.random()*2-1)*this.shakeM;
      if(this.shakeT<=0)this.shakeM=0;
    } else { this.ox=this.oy=0; }
  }
}

/* =====================================================================
   WORLD OBJECTS
   ===================================================================== */
class Platform{
  /* types: solid | ice | crumble (respawns) | bridge (breaks for good) | move */
  constructor(x,y,w,type="solid",h=16,opt={}){
    Object.assign(this,{x,y,w,h,type,opt});
    this.dx=0; this.state=0; this.timer=0; this.broken=false; this.phase=opt.phase||0;
    if(type==="move"){ this.x0=opt.x0??x; this.x1=opt.x1??x+120; this.spd=opt.spd||1; }
  }
  stoodOn(){
    if(this.type==="crumble"&&this.state===0){ this.state=1; this.timer=.55; G.audio.sfx("crumble"); }
    if(this.type==="bridge"&&this.state===0){ this.state=1; this.timer=.7; G.audio.sfx("crumble"); }
  }
  update(dt){
    this.dx=0;
    if(this.type==="move"){
      const t=G.time*this.spd+this.phase;
      const nx=lerp(this.x0,this.x1,(Math.sin(t)+1)/2);
      this.dx=nx-this.x; this.x=nx;
    }
    if(this.state===1){ this.timer-=dt;
      if(this.timer<=0){ this.state=2; this.timer=this.type==="crumble"?3:1e9; this.broken=true;
        G.particles.emit(this.x+this.w/2,this.y+8,{n:14,color:["#8a6a45","#6b4a2f"],spd:150,life:.7});
      }
    } else if(this.state===2&&this.type==="crumble"){ this.timer-=dt;
      if(this.timer<=0){ this.state=0; this.broken=false; }
    }
  }
  get solid(){ return !this.broken; }
  draw(c,cy){
    if(this.broken)return;
    const y=this.y-cy, sh=this.state===1?Math.sin(G.time*60)*2:0;
    const x=this.x+sh;
    // branch-style platform with rounded bark and mossy top
    c.fillStyle=this.type==="ice"?"#d4dcc2":"#7a5230";
    rr(c,x,y,this.w,this.h,7); c.fill();
    c.fillStyle=this.type==="ice"?"#f0ecda":(this.type==="bridge"?"#c9a15c":"#588157");
    rr(c,x,y,this.w,6,6); c.fill();
    if(this.type==="ice"){ c.fillStyle="#ffffff88";
      for(let i=8;i<this.w-8;i+=26)c.fillRect(x+i,y+9,10,2); }
    if(this.type==="bridge"){ c.strokeStyle="#8a6a45"; c.lineWidth=2;
      for(let i=12;i<this.w-6;i+=18){c.beginPath();c.moveTo(x+i,y+1);c.lineTo(x+i,y+this.h-2);c.stroke();} }
    if(this.type==="crumble"){ c.fillStyle="#00000022";
      for(let i=10;i<this.w-8;i+=22)c.fillRect(x+i,y+8,3,6); }
    if(this.type==="move"){ c.fillStyle="#e3b258";
      c.beginPath(); c.arc(x+8,y+this.h/2,3,0,TAU); c.arc(x+this.w-8,y+this.h/2,3,0,TAU); c.fill(); }
  }
}
class Ladder{
  constructor(x,y,h,vine=false){ this.x=x-14; this.y=y; this.w=28; this.h=h; this.vine=vine; }
  draw(c,cy){
    const y=this.y-cy;
    if(this.vine){
      c.strokeStyle="#3a5a40"; c.lineWidth=5; c.lineCap="round";
      for(const off of [6,22]){
        c.beginPath(); c.moveTo(this.x+off,y);
        for(let yy=0;yy<=this.h;yy+=18)
          c.lineTo(this.x+off+Math.sin((yy+G.time*40)/26)*3,y+yy);
        c.stroke();
      }
      c.fillStyle="#7fa768";
      for(let yy=10;yy<this.h;yy+=26)
        c.beginPath(),c.ellipse(this.x+14+Math.sin(yy)*4,y+yy,6,3,.5,0,TAU),c.fill();
    } else {
      c.fillStyle="#a8763e";
      c.fillRect(this.x+2,y,5,this.h); c.fillRect(this.x+21,y,5,this.h);
      c.fillStyle="#c99a5b";
      for(let yy=6;yy<this.h;yy+=16)c.fillRect(this.x+2,y+yy,24,4);
    }
  }
}
class Zone{ /* wind / waterfall push regions */
  constructor(x,y,w,h,fx,fy,kind){ Object.assign(this,{x,y,w,h,fx,fy,kind}); }
  draw(c,cy){
    const y=this.y-cy;
    if(this.kind==="wind"){
      c.strokeStyle="#ffffff44"; c.lineWidth=2;
      for(let i=0;i<5;i++){
        const yy=y+(i/5)*this.h+((G.time*60)%(this.h/5));
        const off=((G.time*this.fx*.8)%(this.w+80))*(this.fx>0?1:-1);
        const sx=this.fx>0?this.x-40+((off%(this.w+80))+this.w+80)%(this.w+80):this.x+this.w+40-(((-off)%(this.w+80))+this.w+80)%(this.w+80);
        c.beginPath(); c.moveTo(sx-30,yy); c.quadraticCurveTo(sx,yy-6,sx+30,yy); c.stroke();
      }
    } else if(this.kind==="fall"){
      const g=c.createLinearGradient(this.x,0,this.x+this.w,0);
      g.addColorStop(0,"#bcd0aa33"); g.addColorStop(.5,"#cfe6d4bb"); g.addColorStop(1,"#bcd0aa33");
      c.fillStyle=g; c.fillRect(this.x,y,this.w,this.h);
      c.fillStyle="#ffffff88";
      for(let i=0;i<6;i++){
        const yy=(G.time*380+i*97)%this.h;
        c.fillRect(this.x+6+(i*13)%(this.w-12),y+yy,3,26);
      }
    }
  }
}
class Checkpoint{
  constructor(x,y){ this.x=x; this.y=y; this.on=false; }
  update(p){
    if(!this.on&&Math.abs(p.cx-this.x)<26&&Math.abs(p.y+p.h-this.y)<40){
      this.on=true; G.respawn={x:this.x,y:this.y-40};
      G.audio.sfx("check"); G.floats.add(this.x,this.y-50,"CHECKPOINT!","#a9c98a");
      G.particles.emit(this.x,this.y-30,{n:12,color:"#a9c98a",spd:120,grav:60,glow:true});
    }
  }
  draw(c,cy){
    const y=this.y-cy;
    c.fillStyle="#8a6a45"; c.fillRect(this.x-2,y-46,4,46);
    c.fillStyle=this.on?"#a9c98a":"#bcbcac";
    const w=Math.sin(G.time*6)*3;
    c.beginPath(); c.moveTo(this.x+2,y-44); c.lineTo(this.x+26+w,y-36); c.lineTo(this.x+2,y-28); c.fill();
  }
}
class Door{
  constructor(x,y,tx,ty,secret=false){ Object.assign(this,{x,y,tx,ty,secret}); }
  draw(c,cy){
    const y=this.y-cy;
    c.fillStyle=this.secret?"#3a2817":"#2e1f10";
    rr(c,this.x-16,y-40,32,40,12); c.fill();
    c.fillStyle=this.secret?"#553d24":"#e3b258";
    c.beginPath(); c.arc(this.x+8,y-20,3,0,TAU); c.fill();
    if(!this.secret){ c.fillStyle="#e3b25866";
      c.beginPath(); c.arc(this.x,y-40,14+Math.sin(G.time*4)*3,0,Math.PI,true); c.fill(); }
  }
}
class Collectible{
  /* fruit +50 | coin +20 | gem 100×combo | acorn secret +500 | heart +1 life | pellet +3 ammo */
  constructor(x,y,type){ Object.assign(this,{x,y,type}); this.taken=false; this.b=Math.random()*TAU; }
  draw(c,cy){
    if(this.taken)return;
    const y=this.y-cy+Math.sin(G.time*3+this.b)*4;
    if(this.type==="fruit"){
      c.fillStyle="#c1594a"; c.beginPath(); c.arc(this.x,y,8,0,TAU); c.fill();
      c.fillStyle="#ffffff55"; c.beginPath(); c.arc(this.x-3,y-3,3,0,TAU); c.fill();
      c.strokeStyle="#3a5a40"; c.lineWidth=3;
      c.beginPath(); c.moveTo(this.x,y-8); c.quadraticCurveTo(this.x+5,y-14,this.x+8,y-12); c.stroke();
    } else if(this.type==="coin"){
      c.fillStyle="#e3b258"; const sq=Math.abs(Math.sin(G.time*4+this.b));
      c.beginPath(); c.ellipse(this.x,y,7*Math.max(.25,sq),8,0,0,TAU); c.fill();
      c.strokeStyle="#c9982a"; c.lineWidth=2; c.stroke();
    } else if(this.type==="gem"){
      c.save(); c.translate(this.x,y); c.rotate(Math.sin(G.time*2+this.b)*.3);
      c.fillStyle="#8fbcab"; c.shadowColor="#8fbcab"; c.shadowBlur=12;
      c.beginPath(); c.moveTo(0,-10); c.lineTo(8,0); c.lineTo(0,10); c.lineTo(-8,0); c.fill();
      c.shadowBlur=0; c.fillStyle="#ffffff66";
      c.beginPath(); c.moveTo(0,-10); c.lineTo(8,0); c.lineTo(0,0); c.fill(); c.restore();
    } else if(this.type==="acorn"){
      c.fillStyle="#c9982a"; c.shadowColor="#e3b258"; c.shadowBlur=14;
      c.beginPath(); c.arc(this.x,y+2,8,0,Math.PI); c.fill(); c.shadowBlur=0;
      c.fillStyle="#7a5230"; rr(c,this.x-9,y-8,18,9,4); c.fill();
      c.fillRect(this.x-2,y-12,4,5);
    } else if(this.type==="pellet"){
      /* trio of small slingshot acorns in a pouch */
      c.fillStyle="#a97c3f";
      c.beginPath(); c.arc(this.x-5,y+3,4,0,TAU); c.arc(this.x+5,y+3,4,0,TAU);
      c.arc(this.x,y-3,4,0,TAU); c.fill();
      c.fillStyle="#6e4a22";
      c.fillRect(this.x-7,y-6,4,2); c.fillRect(this.x+3,y,4,2); c.fillRect(this.x-2,y+1,4,2);
    } else if(this.type==="heart"){
      c.fillStyle="#c1594a"; c.shadowColor="#c1594a"; c.shadowBlur=10;
      c.beginPath(); c.arc(this.x-4,y-2,5,0,TAU); c.arc(this.x+4,y-2,5,0,TAU); c.fill();
      c.beginPath(); c.moveTo(this.x-9,y); c.lineTo(this.x,y+10); c.lineTo(this.x+9,y); c.fill();
      c.shadowBlur=0;
    }
  }
}

/* =====================================================================
   HAZARDS
   ===================================================================== */
class Hazard{ constructor(){ this.dead=false; } update(dt){} draw(c,cy){} collide(p){return false;} }

class Coconut extends Hazard{
  constructor(x,y,dir,spd=150){ super(); this.x=x; this.y=y; this.vx=dir*spd; this.vy=0; this.r=11; this.life=14; this.rot=0; }
  update(dt){
    this.life-=dt; if(this.life<=0)this.dead=true;
    this.vy+=1400*dt;
    const py=this.y;
    this.y+=this.vy*dt; this.x+=this.vx*dt; this.rot+=this.vx*dt/this.r;
    for(const p of G.world.platforms){
      if(!p.solid)continue;
      if(this.vy>=0&&py+this.r<=p.y+6&&this.y+this.r>=p.y&&this.x>p.x-4&&this.x<p.x+p.w+4){
        this.y=p.y-this.r; this.vy=0;
        if(p.type==="bridge")p.stoodOn();
        break;
      }
    }
    if(this.x<-30||this.x>VW+30||this.y>G.world.roomBottom)this.dead=true;
  }
  draw(c,cy){
    const y=this.y-cy;
    c.save(); c.translate(this.x,y); c.rotate(this.rot);
    c.fillStyle="#5a4028"; c.beginPath(); c.arc(0,0,this.r,0,TAU); c.fill();
    c.fillStyle="#3d2b1a";
    c.beginPath(); c.arc(-3,-3,2,0,TAU); c.arc(3,-3,2,0,TAU); c.arc(0,3,2,0,TAU); c.fill();
    c.restore();
  }
  collide(p){ return dist2(this.x,this.y,p.cx,p.cy)<(this.r+14)**2; }
}
class CoconutSpawner extends Hazard{
  constructor(x,y,dir,interval){ super(); Object.assign(this,{x,y,dir,interval}); this.t=interval*Math.random(); }
  update(dt){ this.t-=dt;
    if(this.t<=0){ this.t=this.interval;
      G.world.hazards.push(new Coconut(this.x,this.y-14,this.dir,140+G.levelNum*10)); } }
  draw(c,cy){ const y=this.y-cy; // palm sprout marker
    c.strokeStyle="#3a5a40"; c.lineWidth=4; c.lineCap="round";
    for(const a of [-0.8,-0.2,0.4]){ c.beginPath(); c.moveTo(this.x,y-4);
      c.quadraticCurveTo(this.x+Math.cos(a)*16,y-18,this.x+Math.cos(a)*26,y-14); c.stroke(); } }
}
class Beehive extends Hazard{
  constructor(x,y){ super(); this.x=x; this.y=y; this.state=0; this.vy=0; this.t=0; }
  update(dt){
    const p=G.player;
    if(this.state===0){
      if(Math.abs(p.cx-this.x)<44&&p.cy>this.y&&p.cy-this.y<300){ this.state=1; G.audio.sfx("buzz"); }
    } else if(this.state===1){
      this.vy+=1500*dt; const py=this.y; this.y+=this.vy*dt;
      for(const pl of G.world.platforms){
        if(!pl.solid)continue;
        if(py+10<=pl.y+6&&this.y+10>=pl.y&&this.x>pl.x&&this.x<pl.x+pl.w){
          this.state=2; this.t=1.3; this.y=pl.y-10;
          G.particles.emit(this.x,this.y,{n:16,color:["#e3b258","#333"],spd:130,grav:-30,life:1});
          G.audio.sfx("buzz"); break;
        }
      }
      if(this.y>G.world.roomBottom)this.dead=true;
    } else { this.t-=dt; if(this.t<=0)this.dead=true; }
  }
  draw(c,cy){
    const y=this.y-cy;
    if(this.state<2){
      c.strokeStyle="#5a4630"; c.lineWidth=3;
      c.beginPath(); c.moveTo(this.x,y-26); c.lineTo(this.x,y-12); c.stroke();
      c.fillStyle="#e0b04e";
      c.beginPath(); c.ellipse(this.x,y,11,13,0,0,TAU); c.fill();
      c.strokeStyle="#b8862f"; c.lineWidth=2;
      for(const dy of [-5,0,5]){ c.beginPath(); c.ellipse(this.x,y+dy,10-Math.abs(dy)*.5,3,0,0,Math.PI); c.stroke(); }
      c.fillStyle="#3d2b1a"; c.beginPath(); c.arc(this.x,y+6,3,0,TAU); c.fill();
    } else { // angry bee cloud
      for(let i=0;i<7;i++){
        const a=G.time*7+i*2.2, r=18+i*4;
        c.fillStyle=i%2?"#e3b258":"#333";
        c.beginPath(); c.arc(this.x+Math.cos(a)*r,y-14+Math.sin(a*1.3)*r*.5,3,0,TAU); c.fill();
      }
    }
  }
  collide(p){
    if(this.state===1)return dist2(this.x,this.y,p.cx,p.cy)<24**2;
    if(this.state===2)return dist2(this.x,this.y-14,p.cx,p.cy)<46**2;
    return false;
  }
}
class OwlEnemy extends Hazard{
  constructor(x0,x1,y,spd){ super(); this.x0=x0; this.x1=x1; this.y=y; this.baseY=y;
    this.x=lerp(x0,x1,Math.random()); this.dir=Math.random()<.5?-1:1; this.spd=spd||90; this.t=Math.random()*9; }
  update(dt){
    this.t+=dt;
    this.x+=this.dir*this.spd*dt;
    if(this.x<this.x0){this.x=this.x0;this.dir=1;}
    if(this.x>this.x1){this.x=this.x1;this.dir=-1;}
    this.y=this.baseY+Math.sin(this.t*3)*16;
    const p=G.player;
    // stompable
    if(!this.dead&&p.vy>140&&p.cy<this.y-4&&Math.abs(p.cx-this.x)<20&&Math.abs(p.y+p.h-this.y)<20){
      this.dead=true; p.vy=-420; G.addScore(150,this.x,this.y); G.audio.sfx("stomp");
      G.stat.stomps++; G.checkAch();
      G.particles.emit(this.x,this.y,{n:12,color:["#c9a15c","#8a6a45","#fff"],spd:160,life:.7});
    }
  }
  draw(c,cy){
    const y=this.y-cy, fl=Math.sin(this.t*14)*7;
    c.save(); c.translate(this.x,y); if(this.dir<0)c.scale(-1,1);
    c.fillStyle="#8a6a45"; c.beginPath(); c.ellipse(0,0,14,16,0,0,TAU); c.fill();
    c.fillStyle="#c9a15c"; c.beginPath(); c.ellipse(0,4,9,10,0,0,TAU); c.fill();
    c.fillStyle="#6d5236";
    c.beginPath(); c.ellipse(-12,-2,10,5,-.5+fl*.05,0,TAU); c.fill();
    c.fillStyle="#fff"; c.beginPath(); c.arc(-4,-8,5,0,TAU); c.arc(5,-8,5,0,TAU); c.fill();
    c.fillStyle="#222"; c.beginPath(); c.arc(-3,-8,2,0,TAU); c.arc(6,-8,2,0,TAU); c.fill();
    c.fillStyle="#cf7a3d"; c.beginPath(); c.moveTo(0,-4); c.lineTo(4,0); c.lineTo(-2,1); c.fill();
    c.restore();
  }
  collide(p){ return !this.dead&&dist2(this.x,this.y,p.cx,p.cy)<26**2; }
}
/* --- the player's slingshot pellet: a lobbed acorn --------------------- */
class PlayerShot{
  constructor(x,y,dir,lob){ Object.assign(this,{x,y,dir});
    /* normal shot arcs gently; hold UP to lob high over ledges */
    this.vx=dir*(lob?300:450); this.vy=lob?-340:-180;
    this.t=0; this.spin=0; this.dead=false; }
  pop(col){ this.dead=true;
    G.particles.emit(this.x,this.y,{n:6,color:col||"#8a6a45",spd:100,life:.35}); }
  update(dt,world){
    this.t+=dt; this.spin+=dt*16;
    this.vy+=850*dt; this.x+=this.vx*dt; this.y+=this.vy*dt;
    if(this.t>2.2||this.x<6||this.x>VW-6||this.y>world.H+80){ this.dead=true; return; }
    /* stops on solid wood */
    for(const p of world.platforms){
      if(!p.solid)continue;
      if(this.x>p.x&&this.x<p.x+p.w&&this.y>p.y&&this.y<p.y+p.h){ this.pop(); return; }
    }
    /* knocks out hazards (branches swing on; shockwaves are ground magic) */
    for(const h of world.hazards){
      if(h.dead||h.x===undefined||h instanceof Shockwave)continue;
      if(dist2(h.x,h.y,this.x,this.y)<28**2){
        h.dead=true;
        G.stat.shots++; G.checkAch();
        const bonus=h instanceof CoconutSpawner?250:100;
        G.addScore(bonus,h.x,h.y); G.audio.sfx("stomp");
        G.particles.emit(h.x,h.y,{n:14,color:["#c9a15c","#8a6a45","#fff"],spd:180,life:.6});
        this.pop(); return;
      }
    }
    /* bosses only take pellets while their weak point glows */
    const b=G.boss;
    if(b&&!b.dead&&dist2(b.x,b.y,this.x,this.y)<54**2){
      if(b.weak&&b.inv<=0){ b.hit(); }
      else{ G.audio.sfx("plink");
        G.floats.add(this.x,this.y,"PLINK","#e3b258"); }
      this.pop("#e3b258"); return;
    }
  }
  draw(c,cy){
    const y=this.y-cy;
    c.save(); c.translate(this.x,y); c.rotate(this.spin);
    c.fillStyle="#a97c3f"; c.beginPath(); c.arc(0,1,5,0,Math.PI); c.fill();
    c.fillStyle="#6e4a22"; rr(c,-5,-4,10,5,2); c.fill();
    c.restore();
  }
}

class SwingBranch extends Hazard{
  constructor(px,py,len,spd,phase){ super(); Object.assign(this,{px,py,len,spd}); this.a=0; this.phase=phase||0; }
  update(dt){ this.a=Math.sin(G.time*this.spd+this.phase)*1.15; }
  tip(f){ return {x:this.px+Math.sin(this.a)*this.len*f, y:this.py+Math.cos(this.a)*this.len*f}; }
  draw(c,cy){
    const t=this.tip(1);
    c.strokeStyle="#6b4a2f"; c.lineWidth=8; c.lineCap="round";
    c.beginPath(); c.moveTo(this.px,this.py-cy); c.lineTo(t.x,t.y-cy); c.stroke();
    c.fillStyle="#588157";
    c.beginPath(); c.arc(t.x,t.y-cy,14,0,TAU); c.fill();
    c.fillStyle="#3a5a40";
    c.beginPath(); c.arc(t.x-6,t.y-cy-4,7,0,TAU); c.arc(t.x+7,t.y-cy+3,6,0,TAU); c.fill();
  }
  collide(p){
    for(const f of [.65,1]){ const t=this.tip(f);
      if(dist2(t.x,t.y,p.cx,p.cy)<(f===1?22:14)**2)return true; }
    return false;
  }
}
class Projectile extends Hazard{ /* generic boss projectile */
  constructor(x,y,vx,vy,r,color,grav=900,life=5){ super();
    Object.assign(this,{x,y,vx,vy,r,color,grav,life}); }
  update(dt){
    this.life-=dt; if(this.life<=0)this.dead=true;
    this.vy+=this.grav*dt; this.x+=this.vx*dt; this.y+=this.vy*dt;
    if(this.y>G.world.roomBottom||this.x<-40||this.x>VW+40)this.dead=true;
  }
  draw(c,cy){
    c.fillStyle=this.color;
    c.beginPath(); c.arc(this.x,this.y-cy,this.r,0,TAU); c.fill();
    c.fillStyle="#00000033";
    c.beginPath(); c.arc(this.x+this.r*.3,this.y-cy+this.r*.3,this.r*.5,0,TAU); c.fill();
  }
  collide(p){ return dist2(this.x,this.y,p.cx,p.cy)<(this.r+13)**2; }
}
class Shockwave extends Hazard{
  constructor(x,y,dir){ super(); this.x=x; this.y=y; this.dir=dir; this.life=1.6; }
  update(dt){ this.life-=dt; if(this.life<=0)this.dead=true; this.x+=this.dir*300*dt;
    if(this.x<-20||this.x>VW+20)this.dead=true;
    if((G.time*30|0)%2===0)G.particles.emit(this.x,this.y,{n:1,color:"#c9a15c",spd:60,life:.3,grav:-100});
  }
  draw(c,cy){ const y=this.y-cy;
    c.fillStyle="#e8d5b0";
    c.beginPath(); c.moveTo(this.x-14,y); c.lineTo(this.x,y-22); c.lineTo(this.x+14,y); c.fill(); }
  collide(p){ return Math.abs(p.cx-this.x)<18&&p.y+p.h>this.y-26&&p.y+p.h<this.y+10&&p.grounded; }
}

/* =====================================================================
   PLAYER — Pip the explorer
   ===================================================================== */
class Player{
  constructor(){ this.w=26; this.h=36; this.reset(0,0); }
  reset(x,y){
    this.x=x; this.y=y; this.vx=0; this.vy=0; this.dir=1;
    this.grounded=false; this.climbing=false; this.coyote=0; this.jbuf=0;
    this.ammo=6; this.fireCd=0; // slingshot: press X/F (or ◎ on touch)
    this.usedDouble=false; this.invuln=0; this.anim=0; this.support=null;
    this.spd=0; this.dj=0; this.shield=false; this.leaf=0; this.jumpHeld=false;
  }
  get cx(){ return this.x+this.w/2; } get cy(){ return this.y+this.h/2; }
  update(dt){
    const inp=G.input, world=G.world;
    this.anim+=dt;
    if(this.invuln>0)this.invuln-=dt;
    if(this.spd>0)this.spd-=dt;
    if(this.dj>0)this.dj-=dt;
    if(this.leaf>0){ this.leaf-=dt;
      if((G.time*20|0)%2===0)G.particles.emit(this.cx,this.cy,{n:1,spd:30,grav:-80,life:.5,glow:true,
        color:["#c1594a","#e3b258","#a9c98a","#8fbcab"]}); }

    /* --- slingshot: lob an acorn pellet --- */
    if(this.fireCd>0)this.fireCd-=dt;
    if(inp.pressed("fire")&&this.ammo>0&&this.fireCd<=0){
      this.ammo--; this.fireCd=.38;
      world.shots.push(new PlayerShot(this.cx+this.dir*12,this.cy-6,this.dir,
        inp.get("up")&&!this.climbing));
      G.audio.sfx("shoot");
      G.particles.emit(this.cx+this.dir*14,this.cy-6,{n:4,color:"#e3b258",spd:90,life:.25});
    }

    /* --- ladder / vine climbing --- */
    const lad=world.ladders.find(l=>this.cx>l.x&&this.cx<l.x+l.w&&this.y+this.h>l.y&&this.y<l.y+l.h);
    if(!this.climbing&&lad&&(inp.get("up")||(inp.get("down")&&!this.grounded||inp.get("down")&&this.y+this.h<lad.y+lad.h-8)))
      { this.climbing=true; this.vx=0; this.vy=0; }
    if(this.climbing){
      if(!lad){ this.climbing=false; }
      else{
        this.vy=(inp.get("up")?-170:0)+(inp.get("down")?170:0);
        this.vx=(inp.get("left")?-70:0)+(inp.get("right")?70:0);
        this.x+=(lad.x+lad.w/2-this.cx)*6*dt;
        if(inp.pressed("jump")){ this.climbing=false; this.vy=-470; this.vx=(inp.get("left")?-160:inp.get("right")?160:0); G.audio.sfx("jump"); }
        if(this.y<lad.y-this.h+6&&this.vy<0){ this.climbing=false; this.vy=-200; }
      }
    }

    /* --- run physics --- */
    const onIce=this.support&&this.support.type==="ice";
    if(!this.climbing){
      const sprint=inp.get("sprint")?1.35:1;
      const boost=this.spd>0?1.35:1;
      const top=240*sprint*boost;
      const want=(inp.get("right")?1:0)-(inp.get("left")?1:0);
      if(want)this.dir=want;
      const accel=this.grounded?(onIce?600:2000):1100;
      const fric=this.grounded?(onIce?140:1800):200;
      if(want)this.vx=clamp(this.vx+want*accel*dt,-top,top);
      else{ const s=Math.sign(this.vx); this.vx-=s*Math.min(Math.abs(this.vx),fric*dt); }

      /* jumping: buffer + coyote + optional double jump */
      if(inp.pressed("jump"))this.jbuf=.12;
      if(this.jbuf>0)this.jbuf-=dt;
      if(this.coyote>0)this.coyote-=dt;
      if(this.jbuf>0){
        if(this.grounded||this.coyote>0){
          this.vy=-560; this.grounded=false; this.coyote=0; this.jbuf=0; this.usedDouble=false;
          G.audio.sfx("jump");
          G.particles.emit(this.cx,this.y+this.h,{n:5,color:"#ffffff88",spd:70,grav:200,life:.3});
        } else if(this.dj>0&&!this.usedDouble){
          this.vy=-500; this.usedDouble=true; this.jbuf=0; G.audio.sfx("djump");
          G.particles.emit(this.cx,this.y+this.h,{n:10,color:"#8fbcab",spd:110,grav:100,life:.4,glow:true});
        }
      }
      if(!inp.get("jump")&&this.vy<-220)this.vy=-220; // variable jump height
      this.vy+=1500*dt;
      this.vy=Math.min(this.vy,820);
    }

    /* --- zones: wind & waterfalls --- */
    for(const z of world.zones){
      if(this.cx>z.x&&this.cx<z.x+z.w&&this.cy>z.y&&this.cy<z.y+z.h){
        this.vx+=z.fx*dt; this.vy+=z.fy*dt;
        if(z.kind==="fall"&&(G.time*10|0)%3===0)
          G.particles.emit(this.cx,this.y,{n:1,color:"#cfe6d4",spd:40,life:.3});
      }
    }

    /* --- integrate + platform collisions (one-way, land from above) --- */
    const py=this.y;
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.x=clamp(this.x,26,VW-26-this.w);
    this.grounded=false; const prevSupport=this.support; this.support=null;
    if(!this.climbing&&this.vy>=0){
      for(const p of world.platforms){
        if(!p.solid)continue;
        if(py+this.h<=p.y+8&&this.y+this.h>=p.y&&this.cx>p.x+2&&this.cx<p.x+p.w-2){
          this.y=p.y-this.h; this.vy=0; this.grounded=true; this.coyote=.12;
          this.usedDouble=false; this.support=p;
          this.x+=p.dx; // ride moving platforms
          p.stoodOn();
          break;
        }
      }
    }
    if(prevSupport&&!this.support&&!this.climbing&&this.vy>=0)this.coyote=.12;

    /* fell out of the world → back to checkpoint */
    if(this.y>world.roomBottom+120)G.loseLife("fell");
  }
  hurt(){
    if(this.invuln>0||this.leaf>0)return;
    if(this.shield){ this.shield=false; this.invuln=1.4; G.audio.sfx("stomp");
      G.floats.add(this.cx,this.y-14,"SHIELD!","#a9c98a");
      G.particles.emit(this.cx,this.cy,{n:14,color:"#a9c98a",spd:180,life:.5,glow:true});
      return; }
    G.loseLife("hit");
  }
  draw(c,cy){
    if(this.invuln>0&&(G.time*14|0)%2===0)return;
    const x=this.cx, y=this.y-cy, run=Math.abs(this.vx)>30&&this.grounded;
    const leg=run?Math.sin(this.anim*16)*6:0;
    c.save(); c.translate(x,y); if(this.dir<0)c.scale(-1,1);
    if(this.leaf>0){ c.shadowColor="#e3b258"; c.shadowBlur=16; }
    // legs
    c.strokeStyle="#33503f"; c.lineWidth=6; c.lineCap="round";
    c.beginPath(); c.moveTo(-4,22); c.lineTo(-4+leg,34); c.stroke();
    c.beginPath(); c.moveTo(5,22); c.lineTo(5-leg,34); c.stroke();
    // body + backpack
    c.fillStyle="#7a5230"; rr(c,-14,8,10,16,4); c.fill();
    c.fillStyle="#6b8e58"; rr(c,-9,6,20,20,7); c.fill();
    // arms
    c.strokeStyle="#6b8e58"; c.lineWidth=5;
    const arm=this.climbing?Math.sin(this.anim*10)*8:(run?Math.sin(this.anim*16+2)*7:2);
    c.beginPath(); c.moveTo(-7,12); c.lineTo(-12,18+arm); c.stroke();
    c.beginPath(); c.moveTo(9,12); c.lineTo(13,18-arm); c.stroke();
    // head + cap with red feather (Pip's signature)
    c.fillStyle="#ffd9b0"; c.beginPath(); c.arc(1,-3,11,0,TAU); c.fill();
    c.fillStyle="#b04a36"; c.beginPath(); c.arc(1,-7,11,Math.PI,0); c.fill();
    c.fillRect(-10,-8,22,4);
    c.strokeStyle="#c1594a"; c.lineWidth=3;
    c.beginPath(); c.moveTo(-6,-14); c.quadraticCurveTo(-12,-26,-6,-30); c.stroke();
    // face
    c.fillStyle="#222"; c.beginPath(); c.arc(5,-3,2,0,TAU); c.fill();
    if((G.time%3)<.15)c.fillRect(3,-4,4,1); // blink
    c.fillStyle="#e8a07e"; c.beginPath(); c.arc(9,0,2,0,TAU); c.fill();
    if(this.shield){ c.strokeStyle="#a9c98a88"; c.lineWidth=3;
      c.beginPath(); c.arc(0,10,26+Math.sin(G.time*5)*2,0,TAU); c.stroke(); }
    c.restore();
  }
}
/* rounded rect helper */
function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2);
  c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

/* =====================================================================
   BOSSES — one every second level, each with patterns + weak points
   ===================================================================== */
class Boss{
  constructor(hp,name){ this.hp=hp; this.maxHp=hp; this.name=name;
    this.t=0; this.state="enter"; this.st=0; this.inv=0; this.dead=false;
    this.x=VW/2; this.y=140; this.weak=false; }
  setState(s){ this.state=s; this.st=0; }
  hit(){
    if(this.inv>0||this.dead)return;
    this.hp--; this.inv=1; G.audio.sfx("bosshit"); G.cam.shake(9,.35);
    G.particles.emit(this.x,this.y,{n:20,color:["#fff","#e3b258"],spd:250,life:.6});
    G.addScore(500,this.x,this.y-40);
    if(this.hp<=0){ this.dead=true; this.die(); }
  }
  die(){
    G.audio.sfx("bossdie"); G.cam.shake(14,.8);
    G.particles.emit(this.x,this.y,{n:60,color:["#e3b258","#c1594a","#8fbcab","#fff"],spd:340,life:1.2,glow:true});
    G.bossDefeated();
  }
  tryStomp(zone){ /* player falling onto a weak zone damages the boss */
    const p=G.player;
    if(this.weak&&this.inv<=0&&p.vy>120&&aabb({x:p.x,y:p.y,w:p.w,h:p.h},zone)){
      p.vy=-460; this.hit(); return true;
    }
    return false;
  }
  bodyHurt(r){ const p=G.player;
    if(!this.dead&&this.inv<=0&&dist2(this.x,this.y,p.cx,p.cy)<r*r)p.hurt(); }
  barDraw(c){
    if(this.dead)return;
    c.fillStyle="#00000088"; rr(c,VW/2-160,16,320,18,9); c.fill();
    c.fillStyle="#c1594a"; rr(c,VW/2-156,19,312*(this.hp/this.maxHp),12,6); c.fill();
    c.fillStyle="#fff"; c.font="bold 13px 'Trebuchet MS'"; c.textAlign="center";
    c.fillText(this.name,VW/2,29); c.textAlign="left";
  }
}
class BossOwl extends Boss{
  constructor(){ super(3,"HOOTMORE THE GIANT OWL"); this.y=155; this.tx=VW/2; }
  update(dt){
    if(this.dead)return;
    this.t+=dt; this.st+=dt; if(this.inv>0)this.inv-=dt;
    const p=G.player;
    if(this.state==="enter"){ this.y=lerp(this.y,155,dt*2); if(this.st>1.6)this.setState("hover"); }
    else if(this.state==="hover"){
      this.weak=false;
      this.x=lerp(this.x,VW/2+Math.sin(this.t*1.4)*300,dt*3);
      this.y=155+Math.sin(this.t*3)*18;
      if(this.st>2.2&&Math.random()<dt*.9)
        G.world.hazards.push(new Projectile(this.x,this.y+30,(Math.random()*2-1)*60,60,8,"#c9a15c",500));
      if(this.st>3.4){ this.tx=p.cx; this.setState("swoop"); }
    } else if(this.state==="swoop"){
      this.x=lerp(this.x,this.tx,dt*3.5);
      this.y=lerp(this.y,G.world.arenaFloor-36,dt*3.2);
      this.bodyHurt(44);
      if(this.y>G.world.arenaFloor-60){ this.setState("stun"); G.cam.shake(7,.3);
        G.particles.emit(this.x,G.world.arenaFloor,{n:12,color:"#c9a15c",spd:150,life:.5}); }
    } else if(this.state==="stun"){
      this.weak=true;
      this.tryStomp({x:this.x-34,y:this.y-56,w:68,h:40});
      if(this.st>2.2)this.setState("hover");
    }
  }
  draw(c,cy){
    if(this.dead)return;
    const y=this.y-cy, fl=this.state==="stun"?0:Math.sin(this.t*10)*16;
    c.save(); c.translate(this.x,y);
    if(this.inv>0&&(G.time*16|0)%2===0)c.globalAlpha=.4;
    c.fillStyle="#6d5236"; // wings
    c.beginPath(); c.ellipse(-36,0,26,12,-.5-fl*.02,0,TAU); c.fill();
    c.beginPath(); c.ellipse(36,0,26,12,.5+fl*.02,0,TAU); c.fill();
    c.fillStyle="#8a6a45"; c.beginPath(); c.ellipse(0,0,30,36,0,0,TAU); c.fill();
    c.fillStyle="#c9a15c"; c.beginPath(); c.ellipse(0,10,20,24,0,0,TAU); c.fill();
    c.fillStyle="#fff"; c.beginPath(); c.arc(-10,-16,10,0,TAU); c.arc(10,-16,10,0,TAU); c.fill();
    c.fillStyle=this.state==="stun"?"#bd4a34":"#222";
    const lx=this.state==="swoop"?clamp((G.player.cx-this.x)*.05,-4,4):0;
    c.beginPath(); c.arc(-8+lx,-16,4,0,TAU); c.arc(12+lx,-16,4,0,TAU); c.fill();
    c.fillStyle="#cf7a3d"; c.beginPath(); c.moveTo(0,-10); c.lineTo(8,-2); c.lineTo(-6,0); c.fill();
    if(this.state==="stun"){ c.fillStyle="#e3b258"; // dizzy stars
      for(let i=0;i<3;i++){ const a=G.time*4+i*2.1;
        c.beginPath(); c.arc(Math.cos(a)*26,-44+Math.sin(a)*6,3,0,TAU); c.fill(); } }
    c.restore(); c.globalAlpha=1;
  }
}
class BossBeaver extends Boss{
  constructor(){ super(4,"CHOMPSKY THE ENGINEER"); this.y=0; this.dir=1; this.thrown=0; }
  update(dt){
    if(this.dead)return;
    this.t+=dt; this.st+=dt; if(this.inv>0)this.inv-=dt;
    const floor=G.world.arenaFloor; this.y=floor-34;
    if(this.state==="enter"){ if(this.st>1.2){this.setState("walk");} }
    else if(this.state==="walk"){
      this.weak=false;
      this.x+=this.dir*130*dt;
      if(this.x<120){this.dir=1;} if(this.x>VW-120){this.dir=-1;}
      this.bodyHurt(38);
      if(this.st>1.8){ this.setState("throw"); this.thrown=0; }
    } else if(this.state==="throw"){
      this.dir=G.player.cx>this.x?1:-1;
      if(this.st>this.thrown*.55+.4&&this.thrown<3){
        this.thrown++;
        const dx=G.player.cx-this.x;
        G.world.hazards.push(new Projectile(this.x,this.y-20,clamp(dx*1.1,-380,380),-430,10,"#a4a894",900));
        G.audio.sfx("stomp");
      }
      this.bodyHurt(38);
      if(this.thrown>=3&&this.st>2.4)this.setState("tired");
    } else if(this.state==="tired"){
      this.weak=true;
      this.tryStomp({x:this.x-30,y:this.y-58,w:60,h:44});
      if(this.st>2.6){ this.setState(Math.random()<.4?"dash":"walk"); }
    } else if(this.state==="dash"){
      this.weak=false;
      if(this.st<.5){ this.dir=G.player.cx>this.x?1:-1; }
      else{ this.x+=this.dir*430*dt; this.bodyHurt(40);
        if(this.x<90||this.x>VW-90)this.setState("tired"); }
    }
  }
  draw(c,cy){
    if(this.dead)return;
    const y=this.y-cy, wob=Math.sin(this.t*10)*(this.state==="dash"?4:2);
    c.save(); c.translate(this.x,y+wob); if(this.dir<0)c.scale(-1,1);
    if(this.inv>0&&(G.time*16|0)%2===0)c.globalAlpha=.4;
    c.fillStyle="#8a5a34"; c.beginPath(); c.ellipse(-26,16,16,8,-.4,0,TAU); c.fill(); // tail
    c.strokeStyle="#6d4526"; c.lineWidth=2;
    c.beginPath(); c.moveTo(-36,12); c.lineTo(-16,20); c.moveTo(-34,18); c.lineTo(-18,14); c.stroke();
    c.fillStyle="#a06b3e"; c.beginPath(); c.ellipse(0,4,24,28,0,0,TAU); c.fill();
    c.fillStyle="#c99a5b"; c.beginPath(); c.ellipse(2,12,15,18,0,0,TAU); c.fill();
    // hard hat + goggles = engineer
    c.fillStyle="#e3b258"; c.beginPath(); c.arc(4,-24,15,Math.PI,0); c.fill(); c.fillRect(-13,-25,34,5);
    c.fillStyle="#fff"; c.beginPath(); c.arc(0,-14,6,0,TAU); c.arc(13,-14,6,0,TAU); c.fill();
    c.fillStyle=this.state==="tired"?"#d1705d":"#222";
    c.beginPath(); c.arc(1,-14,2.5,0,TAU); c.arc(14,-14,2.5,0,TAU); c.fill();
    c.fillStyle="#fff"; c.fillRect(2,-6,10,7); // teeth
    c.strokeStyle="#c9982a"; c.strokeRect(2,-6,10,7);
    c.restore(); c.globalAlpha=1;
  }
}
class BossGolem extends Boss{
  constructor(){ super(4,"MOSSBOUND THE GOLEM"); this.stomps=0; this.dir=1; }
  update(dt){
    if(this.dead)return;
    this.t+=dt; this.st+=dt; if(this.inv>0)this.inv-=dt;
    const floor=G.world.arenaFloor; this.y=floor-52;
    if(this.state==="enter"){ if(this.st>1.2)this.setState("advance"); }
    else if(this.state==="advance"){
      this.weak=false;
      this.dir=G.player.cx>this.x?1:-1;
      this.x+=this.dir*70*dt; this.bodyHurt(52);
      if(this.st>1.6)this.setState("stomp");
    } else if(this.state==="stomp"){
      if(this.st>.5&&!this._did){ this._did=true;
        G.cam.shake(10,.35); G.audio.sfx("bosshit");
        G.world.hazards.push(new Shockwave(this.x-40,floor,-1));
        G.world.hazards.push(new Shockwave(this.x+40,floor,1));
        this.stomps++;
      }
      this.bodyHurt(52);
      if(this.st>1){ this._did=false;
        if(this.stomps>=3){ this.stomps=0; this.setState("kneel"); }
        else this.setState(Math.random()<.5?"rock":"advance");
      }
    } else if(this.state==="rock"){
      if(this.st>.4&&!this._did){ this._did=true;
        const dx=G.player.cx-this.x;
        G.world.hazards.push(new Projectile(this.x,this.y-40,clamp(dx,-320,320),-520,13,"#7d8a70",800));
      }
      this.bodyHurt(52);
      if(this.st>1.1){ this._did=false; this.setState("advance"); }
    } else if(this.state==="kneel"){
      this.weak=true;
      this.tryStomp({x:this.x-40,y:this.y-70,w:80,h:50});
      if(this.st>2.4)this.setState("advance");
    }
  }
  draw(c,cy){
    if(this.dead)return;
    const y=this.y-cy, kneel=this.state==="kneel"?14:0;
    c.save(); c.translate(this.x,y+kneel);
    if(this.inv>0&&(G.time*16|0)%2===0)c.globalAlpha=.4;
    c.fillStyle="#6e7d62"; // legs
    rr(c,-34,26-kneel,20,26+kneel,8); c.fill(); rr(c,14,26-kneel,20,26+kneel,8); c.fill();
    c.fillStyle="#7d8a70"; rr(c,-38,-34,76,66,18); c.fill(); // torso
    c.fillStyle="#588157"; // moss
    c.beginPath(); c.arc(-24,-30,10,0,TAU); c.arc(6,-36,8,0,TAU); c.arc(28,-24,7,0,TAU); c.fill();
    c.fillStyle="#6e7d62"; rr(c,-56,-24,20,44,9); c.fill(); rr(c,36,-24,20,44,9); c.fill(); // arms
    c.fillStyle="#3d4a38"; rr(c,-20,-58,40,30,10); c.fill(); // head
    c.fillStyle=this.state==="kneel"?"#e3b258":"#d2e2c6";
    c.beginPath(); c.arc(-8,-44,4,0,TAU); c.arc(8,-44,4,0,TAU); c.fill();
    if(this.weak){ // glowing crystal weak point
      c.fillStyle="#8fbcab"; c.shadowColor="#8fbcab"; c.shadowBlur=16;
      c.beginPath(); c.moveTo(0,-78); c.lineTo(10,-62); c.lineTo(0,-52); c.lineTo(-10,-62); c.fill();
      c.shadowBlur=0;
    }
    c.restore(); c.globalAlpha=1;
  }
}
class BossRaccoon extends Boss{
  constructor(){ super(5,"RATCHET THE INVENTOR"); this.y=150; this.phase=0; }
  update(dt){
    if(this.dead)return;
    this.t+=dt; this.st+=dt; if(this.inv>0)this.inv-=dt;
    const spd=1+ (this.maxHp-this.hp)*.15;
    if(this.state==="enter"){ if(this.st>1.4)this.setState("bomb"); }
    else if(this.state==="bomb"){
      this.weak=false;
      this.x=VW/2+Math.sin(this.t*1.6*spd)*340;
      this.y=150+Math.sin(this.t*3)*14;
      if(this.st>.9){ this.st=0;
        G.world.hazards.push(new Projectile(this.x,this.y+30,0,60,11,"#5a4028",700));
        this.phase++;
        if(this.phase>=4){ this.phase=0; this.setState("sweep"); }
      }
    } else if(this.state==="sweep"){
      if(this.st<.7){ this._sy=G.player.cy-14; this._dir=G.player.cx>this.x?1:-1; }
      else{
        this.y=lerp(this.y,clamp(this._sy,120,G.world.arenaFloor-50),dt*5);
        this.x+=this._dir*(380*spd)*dt;
        this.bodyHurt(42);
        if(this.x<70||this.x>VW-70){ this.setState("overheat"); }
      }
    } else if(this.state==="overheat"){
      this.y=lerp(this.y,G.world.arenaFloor-40,dt*4);
      this.weak=this.y>G.world.arenaFloor-70;
      if(this.weak){
        if((G.time*8|0)%2===0)G.particles.emit(this.x+20,this.y-10,{n:1,color:["#a8a89a","#7a7a6e"],spd:40,grav:-140,life:.8});
        this.tryStomp({x:this.x-34,y:this.y-64,w:68,h:44});
      }
      if(this.st>3){ this.setState("bomb"); this.y=150; }
    }
  }
  draw(c,cy){
    if(this.dead)return;
    const y=this.y-cy;
    c.save(); c.translate(this.x,y);
    if(this.inv>0&&(G.time*16|0)%2===0)c.globalAlpha=.4;
    // whirligig machine
    const rot=this.state==="overheat"?G.time*6:G.time*40;
    c.strokeStyle="#a4a894"; c.lineWidth=4;
    c.beginPath(); c.moveTo(0,-40); c.lineTo(0,-52); c.stroke();
    c.fillStyle="#c6c8b4";
    c.save(); c.translate(0,-54); c.scale(Math.sin(rot),1);
    c.beginPath(); c.ellipse(0,0,34,4,0,0,TAU); c.fill(); c.restore();
    c.fillStyle="#8b6f4e"; rr(c,-30,8,60,22,9); c.fill(); // wooden tub
    c.fillStyle="#6d5236"; c.fillRect(-30,8,60,5);
    // raccoon body
    c.fillStyle="#98a088"; c.beginPath(); c.ellipse(0,-8,20,24,0,0,TAU); c.fill();
    c.fillStyle="#5e6656"; // striped tail
    c.beginPath(); c.ellipse(-26,4,14,7,-.6,0,TAU); c.fill();
    c.fillStyle="#98a088"; c.beginPath(); c.ellipse(-30,1,5,6,-.6,0,TAU); c.fill();
    // head + mask + goggles
    c.fillStyle="#b0b6a0"; c.beginPath(); c.arc(0,-30,14,0,TAU); c.fill();
    c.fillStyle="#434a3e";
    c.beginPath(); c.ellipse(-6,-31,7,5,.2,0,TAU); c.ellipse(7,-31,7,5,-.2,0,TAU); c.fill();
    c.fillStyle="#e3b258"; c.beginPath(); c.arc(-5,-31,3.5,0,TAU); c.arc(6,-31,3.5,0,TAU); c.fill();
    c.fillStyle="#222"; c.beginPath(); c.arc(-5,-31,1.6,0,TAU); c.arc(6,-31,1.6,0,TAU); c.fill();
    c.beginPath(); c.moveTo(-6,-44); c.lineTo(-2,-38); c.lineTo(-10,-38); c.fill(); // ears
    c.beginPath(); c.moveTo(8,-44); c.lineTo(12,-38); c.lineTo(4,-38); c.fill();
    c.fillStyle="#222"; c.beginPath(); c.arc(0,-24,2.5,0,TAU); c.fill();
    if(this.state==="overheat"){ c.fillStyle="#c75c47";
      c.beginPath(); c.arc(24,14,4+Math.sin(G.time*12)*2,0,TAU); c.fill(); }
    c.restore(); c.globalAlpha=1;
  }
}
