 {name:"GLOWMOTH DARK",    rows:12, coco:4, hive:4, owls:5, swings:4, mech:["move","crumble","vine","dark"],boss:null,sky:["#2c3c30","#16261c"], time:250},
 {name:"RATCHET'S CROWN",  rows:13, coco:5, hive:4, owls:5, swings:4, mech:["ice","move","crumble","bridge","wind","dark"],boss:BossRaccoon,sky:["#2e3a2a","#151d14"], time:280},
];
const ARENA_H=660, ROW_GAP=96;

function buildLevel(n){
  const spec=LEVEL_SPECS[n-1], rng=mulberry32(n*7919+13);
  const rows=spec.rows;
  const H=ARENA_H+rows*ROW_GAP+120;
  const w={W:VW,H,roomBottom:H+700,spec,platforms:[],ladders:[],zones:[],hazards:[],
    items:[],powers:[],checkpoints:[],doors:[],goal:null,boss:null,shots:[],dark:spec.mech.includes("dark"),
    arenaFloor:560,bossGate:spec.boss?ARENA_H-10:0,fireflies:[]};
  const P=(x,y,wd,type,h,opt)=>{const p=new Platform(x,y,wd,type,h,opt);w.platforms.push(p);return p;};

  /* ground + arena */
  P(0,H-32,VW,"solid",32);
  P(0,560,VW,"solid",24);                       // arena floor
  P(150,392,170,"solid"); P(640,392,170,"solid"); // arena side perches
  if(!spec.boss) w.goal=new Goal(VW/2,560);

  /* ladder x positions, one per row + final into arena */
  const lx=[];
  for(let j=0;j<=rows;j++){
    let x; let guard=0;
    do{ x=90+rng()*(VW-180); }while(lx.length&&Math.abs(x-lx[j-1])<170&&guard++<20);
    lx.push(x);
  }
  const rowY=i=>H-32-(i+1)*ROW_GAP;
  const standY=j=>j===0?H-32:rowY(j-1);

  /* ladders (some are vines on vine levels) */
  const vineLvl=spec.mech.includes("vine");
  for(let j=0;j<rows;j++)
    w.ladders.push(new Ladder(lx[j],rowY(j),standY(j)-rowY(j),vineLvl&&j%2===1));
  w.ladders.push(new Ladder(lx[rows],560,rowY(rows-1)-560,vineLvl));

  /* row platforms: always cover this row's ladder top + next ladder base */
  const mains=[];
  for(let i=0;i<rows;i++){
    const y=rowY(i);
    const a=Math.min(lx[i],lx[i+1]), b=Math.max(lx[i],lx[i+1]);
    let x0=clamp(a-70-rng()*60,16,VW-140), x1=clamp(b+70+rng()*60,x0+130,VW-16);
    const width=x1-x0;
    let type="solid";
    if(spec.mech.includes("ice")&&rng()<.45)type="ice";
    // split wide platforms with a jumpable gap (never under a ladder)
    if(width>560&&rng()<.65){
      let g; let guard=0;
      do{ g=x0+120+rng()*(width-240); }
      while((Math.abs(g-lx[i])<80||Math.abs(g-lx[i+1])<80)&&guard++<24);
      if(guard<24){
        const t2=spec.mech.includes("bridge")&&rng()<.5?"bridge":type;
        mains.push(P(x0,y,g-42-x0,type));
        mains.push(P(g+42,y,x1-g-42,t2));
        // swinging branch guarding the gap
        if(spec.swings>0&&rng()<.55)
          w.hazards.push(new SwingBranch(g,y-150,118,1.6+rng()*.7,rng()*6));
        continue;
      }
    }
    mains.push(P(x0,y,width,type));
  }

  /* extra floating platforms with goodies */
  for(let i=0;i<rows;i++){
    if(rng()<.7){
      const y=rowY(i)-46, wd=90+rng()*70;
      const x=clamp(30+rng()*(VW-60-wd),30,VW-30-wd);
      let type="solid";
      if(spec.mech.includes("crumble")&&rng()<.5)type="crumble";
      if(spec.mech.includes("move")&&rng()<.35)type="move";
      const opt=type==="move"?{x0:Math.max(20,x-90),x1:Math.min(VW-20-wd,x+90),spd:.9+rng()*.8,phase:rng()*6}:{};
      const p=P(x,y,wd,type,16,opt);
      for(let k=0;k<3;k++)
        w.items.push(new Collectible(x+wd/2+(k-1)*26,y-26-Math.abs(k-1)*8,"gem"));
    }
  }

  /* fruits along main platforms, coins along ladders */
  for(const m of mains)
    for(let x=m.x+40;x<m.x+m.w-30;x+=110)
      if(rng()<.7)w.items.push(new Collectible(x,m.y-22,"fruit"));
  for(const l of w.ladders)
    for(let y=l.y+34;y<l.y+l.h-20;y+=52)
      if(rng()<.5)w.items.push(new Collectible(l.x+14,y,"coin"));

  /* hazards per spec */
  const pick=arr=>arr[(rng()*arr.length)|0];
  for(let k=0;k<spec.coco;k++){
    const m=pick(mains);
    const left=rng()<.5;
    w.hazards.push(new CoconutSpawner(left?m.x+16:m.x+m.w-16,m.y,left?1:-1,3.4-n*.18));
  }
  for(let k=0;k<spec.hive;k++){
    const m=pick(mains);
    w.hazards.push(new Beehive(m.x+30+rng()*(m.w-60),m.y+26));
  }
  for(let k=0;k<spec.owls;k++){
    const i=1+((rng()*(rows-1))|0);
    w.hazards.push(new OwlEnemy(60,VW-60,rowY(i)-52,80+n*8));
  }
  for(let k=0;k<spec.swings-1;k++){
    const m=pick(mains);
    w.hazards.push(new SwingBranch(m.x+m.w/2,m.y-170,120,1.5+rng()*.8,rng()*6));
  }

  /* wind bands + waterfalls */
  if(spec.mech.includes("wind")){
    for(let k=0;k<2;k++){
      const i=1+((rng()*(rows-2))|0);
      w.zones.push(new Zone(0,rowY(i)-10,VW,ROW_GAP-16,(rng()<.5?-1:1)*(150+n*10),0,"wind"));
    }
  }
  if(spec.mech.includes("fall")){
    for(let k=0;k<2;k++){
      let x,guard=0;
      do{ x=120+rng()*(VW-240); }while(w.ladders.some(l=>Math.abs(l.x+14-x)<90)&&guard++<24);
      w.zones.push(new Zone(x-35,ARENA_H,70,H-64-ARENA_H,0,520,"fall"));
    }
  }

  /* power-ups: 2–3 per level, kinds themed to what helps */
  const kinds=["speed","djump","shield","leaf","slow"];
  for(let k=0;k<2+(n>4?1:0);k++){
    const m=pick(mains);
    w.powers.push(new PowerUp(m.x+40+rng()*(m.w-80),m.y-30,kinds[(rng()*kinds.length)|0]));
  }
  /* one extra heart on later levels */
  if(n>=3){ const m=pick(mains); w.items.push(new Collectible(m.x+m.w/2,m.y-70,"heart")); }

  /* checkpoints: mid + near top */
  for(const i of [Math.floor(rows/2)-1,rows-1]){
    const m=mains[i];
    w.checkpoints.push(new Checkpoint(clamp(lx[i]+60,60,VW-60),m.y));
  }

  /* secret bonus room (hidden door on one row edge) */
  {
    const i=1+((rng()*(rows-2))|0), m=mains[i];
    const doorX=m.x<80?m.x+26:(m.x+m.w>VW-80?m.x+m.w-26:(rng()<.5?m.x+26:m.x+m.w-26));
    const roomY=H+560;
    P(300,roomY,360,"solid",24);
    const back=new Door(330,roomY,doorX,m.y,false);
    w.doors.push(new Door(doorX,m.y,330,roomY,true), back);
    for(let gx=0;gx<5;gx++)for(let gy=0;gy<2;gy++)
      w.items.push(new Collectible(390+gx*40,roomY-40-gy*40,"coin"));
    w.items.push(new Collectible(620,roomY-46,"acorn"));
  }

  /* slingshot ammo pouches: a few per level, more once hazards ramp up */
  {
    const nP=2+Math.min(3,(n/2|0));
    for(let k=0;k<nP;k++){
      const pl=w.platforms[(rng()*w.platforms.length)|0];
      if(pl&&pl.w>70)w.items.push(new Collectible(pl.x+30+rng()*(pl.w-60),pl.y-22,"pellet"));
    }
  }

  /* fireflies light the dark levels */
  if(w.dark)for(let k=0;k<14;k++)
    w.fireflies.push({x:rng()*VW,y:ARENA_H+rng()*(H-ARENA_H-100),t:rng()*9,r:90+rng()*40});

  /* ambient decor leaves */
  w.decor=[];
  for(let k=0;k<26;k++)w.decor.push({x:rng()*VW,y:rng()*H,s:.4+rng()*.9,t:rng()*9});
  return w;
}

/* =====================================================================
   GAME — states, HUD, rendering, achievements, main loop
   ===================================================================== */
const ACH_DEFS={
  rescue1:{name:"First Rescue",desc:"Free your first Glimmer"},
  combo5:{name:"Sparkle Chain",desc:"Reach a x5 gem combo"},
  untouched:{name:"Untouchable",desc:"Clear a level without damage"},
  secret:{name:"Treasure Hunter",desc:"Find a golden acorn"},
  stomp10:{name:"Owl Bouncer",desc:"Bounce 10 owls"},
  sharp15:{name:"Sharpshooter",desc:"Blast 15 hazards with the slingshot"},
  coins100:{name:"Coin Collector",desc:"Gather 100 coins"},
  winner:{name:"Canopy Hero",desc:"Defeat Ratchet and finish the game"}
};
const KONAMI=["up","up","down","down","left","right","left","right","b","a"];

class Game{
  constructor(){
    this.canvas=document.getElementById("game");
    this.ctx=this.canvas.getContext("2d");
    this.light=document.createElement("canvas"); this.light.width=VW; this.light.height=VH;
    this.lctx=this.light.getContext("2d");
    this.input=new InputSys(); this.audio=new AudioSys();
    this.particles=new Particles(); this.floats=new FloatTexts(); this.cam=new Camera();
    this.player=new Player();
    this.settings=Object.assign({sfx:true,music:true,shake:true},Save.get("set",{}));
    this.ach=Save.get("ach",{}); this.achQueue=[];
    this.progress=Save.get("progress",1);
    this.scores=Save.get("scores",[]);
    this.state="title"; this.menuIdx=0; this.time=0; this.stateT=0;
    this.stat={stomps:Save.get("stomps",0),coins:Save.get("coins",0),shots:Save.get("shots",0)};
    this.uiButtons=[]; this.konami=[]; this.storyPage=0;
    this.audio.sfxOn=this.settings.sfx; this.audio.musicOn=this.settings.music;
    this.canvas.addEventListener("pointerdown",e=>this.onTap(e));
  }
  /* ---------- run/session ---------- */
  newRun(startLevel){
    this.score=0; this.lives=3; this.coins=0; this.combo=0; this.comboT=0;
    this.startLevel(startLevel||1);
  }
  startLevel(n){
    this.levelNum=n; this.world=buildLevel(n);
    this.levelTime=0; this.tookHit=false; this.bossActive=false; this.boss=null;
    this.respawn={x:80,y:this.world.H-90};
    this.player.reset(this.respawn.x,this.respawn.y);
    this.cam.y=this.cam.ty=this.world.H-VH;
    this.state="play"; this.stateT=0; this.ts=1; this.slowT=0;
    this.audio.setSong("main");
  }
  addScore(v,x,y){
    this.score+=v;
    if(x!==undefined)this.floats.add(x,y,"+"+v,"#e3b258");
  }
  loseLife(why){
    const p=this.player;
    this.tookHit=true;
    this.audio.sfx("hurt"); this.cam.shake(10,.4);
    this.particles.emit(p.cx,p.cy,{n:18,color:["#c1594a","#fff"],spd:220,life:.6});
    this.lives--;
    this.combo=0;
    if(this.lives<0){ this.endRun(false); return; }
    if(why==="fell"){ p.reset(this.respawn.x,this.respawn.y); p.invuln=2; }
    else { p.invuln=2; p.vy=-330; p.vx=p.dir*-220; }
  }
  bossDefeated(){
    this.world.goal=new Goal(VW/2,560);
    this.addScore(2000,VW/2,420);
    this.audio.setSong("main");
  }
  completeLevel(){
    this.audio.sfx("spirit");
    this.unlockAch("rescue1");
    if(!this.tookHit)this.unlockAch("untouched");
    const tb=Math.max(0,(this.world.spec.time-this.levelTime)|0)*10;
    this.bonus={time:tb,lives:Math.max(0,this.lives)*250};
    this.score+=this.bonus.time+this.bonus.lives;
    this.progress=Math.max(this.progress,Math.min(8,this.levelNum+1));
    Save.set("progress",this.progress);
    if(this.levelNum>=8){ this.unlockAch("winner"); this.endRun(true); }
    else { this.state="clear"; this.stateT=0; this.audio.sfx("fanfare"); }
  }
  endRun(won){
    this.won=won;
    this.scores.push({s:this.score,l:this.levelNum,d:new Date().toISOString().slice(0,10)});
    this.scores.sort((a,b)=>b.s-a.s); this.scores=this.scores.slice(0,5);
    Save.set("scores",this.scores);
    this.state=won?"win":"gameover"; this.stateT=0;
    if(won)this.audio.sfx("fanfare");
    this.audio.setSong(null);
  }
  unlockAch(k){
    if(this.ach[k])return;
    this.ach[k]=true; Save.set("ach",this.ach);
    this.achQueue.push({...ACH_DEFS[k],t:4}); this.audio.sfx("power");
  }
  checkAch(){
    if(this.stat.stomps>=10)this.unlockAch("stomp10");
    if(this.stat.shots>=15)this.unlockAch("sharp15");
    if(this.stat.coins>=100)this.unlockAch("coins100");
    Save.set("stomps",this.stat.stomps); Save.set("coins",this.stat.coins);
    Save.set("shots",this.stat.shots);
  }

  /* ---------- input plumbing for menus ---------- */
  onTap(e){
    this.audio.boot();
    const r=this.canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*VW/r.width, my=(e.clientY-r.top)*VH/r.height;
    for(const b of this.uiButtons)
      if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h){ this.audio.sfx("click"); b.cb(); return; }
    if(this.state==="play"&&mx>VW-60&&my<50){ this.pause(); return; }
    if(this.state==="story")this.advanceStory();
  }
  pause(){ if(this.state==="play"){ this.state="paused"; this.menuIdx=0; } }
  advanceStory(){
    this.storyPage++;
    if(this.storyPage>=3)this.newRun(this.pendingLevel||1);
  }
  menuNav(items){
    const i=this.input;
    if(i.pressed("up")){ this.menuIdx=(this.menuIdx+items.length-1)%items.length; this.audio.sfx("click"); }
    if(i.pressed("down")){ this.menuIdx=(this.menuIdx+1)%items.length; this.audio.sfx("click"); }
    if(i.pressed("enter")||i.pressed("jump")){ this.audio.boot(); this.audio.sfx("click"); items[this.menuIdx].cb(); }
  }

  /* ---------- update ---------- */
  update(dt){
    this.time+=dt; this.stateT+=dt;
    this.input.just.forEach(b=>{ // Konami easter egg
      this.konami.push(b==="jump"?"a":b==="sprint"?"b":b);
      if(this.konami.length>10)this.konami.shift();
      if(KONAMI.every((k,i)=>this.konami[i]===k)){
        this.konami=[];
        if(this.lives!==undefined){ this.lives++;
          this.floats.add(this.player?.cx||VW/2,(this.player?.y||300)-30,"SECRET 1-UP!","#a9c98a"); }
        this.particles.emit(VW/2,this.cam.y+120,{n:60,spd:300,grav:250,life:1.4,glow:true,
          color:["#c1594a","#e3b258","#a9c98a","#8fbcab","#a698b3"]});
        this.audio.sfx("fanfare");
      }
    });
    this.audio.update();
    for(const a of this.achQueue)a.t-=dt;
    this.achQueue=this.achQueue.filter(a=>a.t>0);

    if(this.state==="play")this.updatePlay(dt);
    else if(this.state==="clear"&&this.stateT>1&&(this.input.pressed("jump")||this.input.pressed("enter")))
      this.startLevel(this.levelNum+1);
    this.particles.update(dt); this.floats.update(dt);
    this.input.endFrame();
  }
  updatePlay(dt){
    const w=this.world, p=this.player;
    if(this.input.pressed("pause")){ this.pause(); return; }
    this.levelTime+=dt;
    if(this.slowT>0){ this.slowT-=dt; this.ts=.45; } else this.ts=1;
    const hdt=dt*this.ts; // hazard/boss time (slow-motion hourglass)

    p.update(dt);

    /* boss gate */
    if(w.bossGate&&!this.bossActive&&p.y<w.bossGate){
      this.bossActive=true;
      this.boss=new w.spec.boss();
      this.audio.setSong("boss");
      this.cam.shake(6,.4);
    }
    if(this.boss&&!this.boss.dead)this.boss.update(hdt);

    for(const pl of w.platforms)pl.update(dt);
    for(let i=w.hazards.length-1;i>=0;i--){
      const h=w.hazards[i]; h.update(hdt);
      if(h.dead){ w.hazards.splice(i,1); continue; }
      if(h.collide(p))p.hurt();
    }
    for(const cp of w.checkpoints)cp.update(p);

    /* player slingshot pellets */
    for(let i=w.shots.length-1;i>=0;i--){
      const sh=w.shots[i]; sh.update(dt,w);
      if(sh.dead)w.shots.splice(i,1);
    }

    /* collectibles */
    if(this.comboT>0){ this.comboT-=dt; if(this.comboT<=0)this.combo=0; }
    for(const it of w.items){
      if(it.taken)continue;
      if(dist2(it.x,it.y,p.cx,p.cy)<26**2){
        it.taken=true;
        if(it.type==="fruit"){ this.addScore(50,it.x,it.y); this.audio.sfx("fruit");
          this.particles.emit(it.x,it.y,{n:6,color:"#c1594a",spd:100,life:.4}); }
        else if(it.type==="coin"){ this.coins++; this.stat.coins++; this.addScore(20,it.x,it.y);
          this.audio.sfx("coin"); this.checkAch(); }
        else if(it.type==="gem"){ this.combo=Math.min(9,this.combo+1); this.comboT=3;
          const v=100*this.combo; this.score+=v;
          this.floats.add(it.x,it.y,"+"+v+(this.combo>1?"  x"+this.combo:""),"#8fbcab");
          this.audio.sfx("gem"); if(this.combo>=5)this.unlockAch("combo5");
          this.particles.emit(it.x,it.y,{n:8,color:"#8fbcab",spd:120,life:.5,glow:true}); }
        else if(it.type==="acorn"){ this.addScore(500,it.x,it.y); this.unlockAch("secret");
          this.audio.sfx("power"); }
        else if(it.type==="heart"){ this.lives++; this.floats.add(it.x,it.y,"1-UP!","#a9c98a");
          this.audio.sfx("power"); }
        else if(it.type==="pellet"){ p.ammo=Math.min(15,p.ammo+3);
          this.floats.add(it.x,it.y,"+3 ACORNS","#c9a15c"); this.audio.sfx("coin"); }
      }
    }
    for(const pw of w.powers){
      if(pw.taken)continue;
      if(dist2(pw.x,pw.y,p.cx,p.cy)<28**2){
        pw.taken=true; this.audio.sfx("power");
        const label={speed:"SPEED!",djump:"DOUBLE JUMP!",shield:"SHIELD!",leaf:"INVINCIBLE!",slow:"SLOW-MO!"};
        this.floats.add(pw.x,pw.y-14,label[pw.kind],"#fff");
        if(pw.kind==="speed")p.spd=8;
        if(pw.kind==="djump")p.dj=14;
        if(pw.kind==="shield")p.shield=true;
        if(pw.kind==="leaf")p.leaf=6;
        if(pw.kind==="slow")this.slowT=6;
      }
    }
    /* doors (press up while standing at one) */
    for(const d of w.doors){
      if(Math.abs(p.cx-d.x)<20&&Math.abs(p.y+p.h-d.y)<26&&this.input.pressed("up")&&!p.climbing){
        p.x=d.tx-p.w/2; p.y=d.ty-p.h-2; p.vy=0;
        this.audio.sfx("door"); this.cam.y=this.cam.ty=clamp(d.ty-VH*.6,0,1e9);
        break;
      }
    }
    /* goal */
    if(w.goal&&!w.goal.freed&&dist2(w.goal.x,w.goal.y-34,p.cx,p.cy)<40**2){
      w.goal.freed=true; this.completeLevel();
    }
    /* camera: follow, lock in boss arena / bonus room */
    if(this.bossActive&&p.y<ARENA_H+80)this.cam.ty=70; // floor (y=560) lands at screen ~490
    else this.cam.ty=p.cy-VH*.58;
    const inRoom=p.y>w.H;
    this.cam.update(dt, inRoom?w.H+240:0, inRoom?w.roomBottom-VH:w.H-VH);
  }

  /* ---------- rendering ---------- */
  draw(){
    const c=this.ctx; this.uiButtons=[];
    c.save(); c.translate(this.cam.ox,this.cam.oy);
    if(this.state==="title"||this.state==="scores"||this.state==="settings"&&!this.world)
      this.drawTitleBG(c);
    else if(this.state==="story")this.drawStory(c);
    else this.drawWorld(c);
    c.restore();
    this.drawUI(c);
  }
  drawTitleBG(c){
    const g=c.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,"#b3c4a0"); g.addColorStop(1,"#ece2c4");
    c.fillStyle=g; c.fillRect(0,0,VW,VH);
    this.drawClouds(c,0,.4);
    // big tree silhouette
    c.fillStyle="#3a5a40";
    for(const [x,y,r] of [[480,120,150],[330,200,110],[640,210,120],[480,260,140]])
      c.beginPath(),c.arc(x,y+Math.sin(this.time+x)*4,r,0,TAU),c.fill();
    c.fillStyle="#6b4a2f"; c.fillRect(440,240,80,300);
    // drifting spirits
    for(let i=0;i<6;i++){
      const t=this.time*.5+i*1.3;
      c.fillStyle="#e0e8d6cc"; c.shadowColor="#8fbcab"; c.shadowBlur=12;
      c.beginPath(); c.arc(200+((i*160+t*30)%700),380-((t*24+i*60)%300),6,0,TAU); c.fill();
      c.shadowBlur=0;
    }
    c.fillStyle="#588157"; c.fillRect(0,VH-40,VW,40);
  }
  drawStory(c){
    c.fillStyle="#16261c"; c.fillRect(0,0,VW,VH);
    const pages=[
      ["High in the Whispering Tree live the Glimmer Spirits,","tiny lights that keep the forest green and growing."],
      ["But Ratchet the raccoon inventor has CAGED them","to power his ridiculous flying contraption!"],
      ["Pip grabs a cap, a backpack and a brave red feather.","Climb the tree. Free every Glimmer. Stop that raccoon!"]
    ];
    // vignette scene
    c.fillStyle="#20342a"; c.beginPath(); c.arc(VW/2,220,160,0,TAU); c.fill();
    if(this.storyPage===0){
      for(let i=0;i<5;i++){ const a=this.time+i*1.26;
        c.fillStyle="#e0e8d6"; c.shadowColor="#8fbcab"; c.shadowBlur=14;
        c.beginPath(); c.arc(VW/2+Math.cos(a)*90,220+Math.sin(a*1.4)*60,8,0,TAU); c.fill(); }
      c.shadowBlur=0;
    } else if(this.storyPage===1){
      c.strokeStyle="#5a4630"; c.lineWidth=5;
      for(let i=-2;i<=2;i++){c.beginPath();c.moveTo(VW/2+i*22,150);c.lineTo(VW/2+i*22,290);c.stroke();}
      c.fillStyle="#e0e8d6"; c.shadowColor="#8fbcab"; c.shadowBlur=14;
      c.beginPath(); c.arc(VW/2,220,10,0,TAU); c.fill(); c.shadowBlur=0;
    } else {
      const saved=this.player; this.player=this.player||new Player();
      c.save(); c.translate(VW/2-13,200); c.scale(2,2);
      this.player.x=0;this.player.y=0;this.player.invuln=0;this.player.draw(c,0);
      c.restore(); this.player=saved;
    }
    c.fillStyle="#fff"; c.font="20px 'Trebuchet MS'"; c.textAlign="center";
    pages[this.storyPage].forEach((l,i)=>c.fillText(l,VW/2,392+i*30));
    c.fillStyle="#e3b258"; c.font="bold 15px 'Trebuchet MS'";
    if((this.time*2|0)%2===0)c.fillText("PRESS JUMP OR TAP TO CONTINUE",VW/2,486);
    c.textAlign="left";
    if(this.input.pressed("jump")||this.input.pressed("enter"))this.advanceStory();
  }
  drawClouds(c,cy,f){
    c.fillStyle="#ffffffbb";
    for(let i=0;i<6;i++){
      const x=((i*260+this.time*12*(1+i%3*.3))%(VW+240))-120;
      const y=60+i*54-cy*f*.3;
      c.beginPath(); c.arc(x,y,26,0,TAU); c.arc(x+26,y-9,20,0,TAU); c.arc(x+48,y+2,22,0,TAU); c.fill();
    }
  }
  drawWorld(c){
    const w=this.world, cy=this.cam.y;
    /* parallax sky per level theme */
    const g=c.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,w.spec.sky[0]); g.addColorStop(1,w.spec.sky[1]);
    c.fillStyle=g; c.fillRect(0,0,VW,VH);
    this.drawClouds(c,cy,1);
    /* far canopy blobs (parallax) */
    c.fillStyle=w.dark?"#1e3024":"#00000012";
    for(let i=0;i<8;i++){
      const y=((i*300-cy*.35)%(VH+300)+VH+300)%(VH+300)-150;
      c.beginPath(); c.arc((i*331)%VW,y,90+(i%3)*30,0,TAU); c.fill();
    }
    /* signature: enchanted trunk walls framing the climb */
    for(const side of [0,1]){
      const x=side?VW-26:0;
      c.fillStyle="#4a3020"; c.fillRect(x,0,26,VH);
      c.fillStyle="#5d3d26";
      for(let i=0;i<9;i++){
        const y=((i*90-cy)%(VH+90)+VH+90)%(VH+90)-45;
        c.beginPath(); c.ellipse(x+13,y,7,26,side?.3:-.3,0,TAU); c.fill();
      }
    }
    /* drifting leaves + rising spirit motes */
    for(const d of w.decor){
      const y=d.y-cy*(.75+d.s*.2);
      if(y<-20||y>VH+20)continue;
      const wob=Math.sin(this.time*1.6+d.t)*14;
      c.fillStyle=w.dark?"#8fbcab33":"#58815766";
      c.save(); c.translate((d.x+wob+this.time*9*d.s)%VW,((y%VH)+VH)%VH);
      c.rotate(this.time*2*d.s+d.t);
      c.beginPath(); c.ellipse(0,0,6*d.s,3*d.s,0,0,TAU); c.fill(); c.restore();
    }
    /* zones behind world */
    for(const z of w.zones)if(z.kind==="wind")z.draw(c,cy);
    /* world objects */
    for(const l of w.ladders)l.draw(c,cy);
    for(const p of w.platforms)p.draw(c,cy);
    for(const d of w.doors)d.draw(c,cy);
    for(const cp of w.checkpoints)cp.draw(c,cy);
    for(const it of w.items)it.draw(c,cy);
    for(const pw of w.powers)pw.draw(c,cy);
    for(const z of w.zones)if(z.kind==="fall")z.draw(c,cy);
    for(const h of w.hazards)h.draw(c,cy);
    for(const sh of w.shots)sh.draw(c,cy);
    if(w.goal)w.goal.draw(c,cy);
    if(this.boss)this.boss.draw(c,cy);
    this.player.draw(c,cy);
    this.particles.draw(c,this.cam);
    this.floats.draw(c,this.cam);
    /* darkness + firefly lighting */
    if(w.dark){
      const l=this.lctx;
      l.globalCompositeOperation="source-over";
      l.fillStyle="rgba(10,18,12,0.93)"; l.fillRect(0,0,VW,VH);
      l.globalCompositeOperation="destination-out";
      const punch=(x,y,r,a)=>{
        const gr=l.createRadialGradient(x,y,0,x,y,r);
        gr.addColorStop(0,"rgba(0,0,0,"+a+")"); gr.addColorStop(1,"rgba(0,0,0,0)");
        l.fillStyle=gr; l.beginPath(); l.arc(x,y,r,0,TAU); l.fill();
      };
      punch(this.player.cx,this.player.cy-cy,150,1);
      for(const f of w.fireflies){
        f.t+=1/60; f.x+=Math.sin(f.t*1.3)*.6; f.y+=Math.cos(f.t*.9)*.5;
        const fy=f.y-cy;
        if(fy>-80&&fy<VH+80)punch(f.x,fy,f.r,.85);
      }
      if(this.boss)punch(this.boss.x,this.boss.y-cy,180,1);
      if(w.goal)punch(w.goal.x,w.goal.y-34-cy,120,1);
      c.drawImage(this.light,0,0);
      /* firefly bodies on top */
      c.fillStyle="#e8d38a";
      for(const f of w.fireflies){
        const fy=f.y-cy; if(fy<-20||fy>VH+20)continue;
        c.shadowColor="#e8d38a"; c.shadowBlur=10;
        c.beginPath(); c.arc(f.x,fy,3+Math.sin(f.t*6)*1,0,TAU); c.fill();
      }
      c.shadowBlur=0;
    } else {
      /* subtle god-ray light */
      const lg=c.createLinearGradient(0,0,0,VH);
      lg.addColorStop(0,"#e3b25822"); lg.addColorStop(.5,"#ffffff00");
      c.fillStyle=lg; c.fillRect(0,0,VW,VH);
    }
  }

  /* ---------- UI: HUD + menus ---------- */
  btn(c,x,y,w,h,label,cb,hot){
    this.uiButtons.push({x,y,w,h,cb});
    c.fillStyle=hot?"#e3b258":"#ffffff22";
    rr(c,x,y,w,h,12); c.fill();
    if(hot){ c.strokeStyle="#fff"; c.lineWidth=2; c.stroke(); }
    c.fillStyle=hot?"#4a3020":"#fff";
    c.font="bold 19px 'Trebuchet MS'"; c.textAlign="center";
    c.fillText(label,x+w/2,y+h/2+7); c.textAlign="left";
  }
  panel(c,x,y,w,h,title){
    c.fillStyle="#16261ccc"; rr(c,x,y,w,h,18); c.fill();
    c.strokeStyle="#e3b258"; c.lineWidth=3; c.stroke();
    if(title){ c.fillStyle="#e3b258"; c.font="bold 30px 'Trebuchet MS'";
      c.textAlign="center"; c.fillText(title,x+w/2,y+42); c.textAlign="left"; }
  }
  drawUI(c){
    const shadowText=(t,x,y,col,size,align)=>{
      c.font="bold "+size+"px 'Trebuchet MS'"; c.textAlign=align||"left";
      c.fillStyle="#00000088"; c.fillText(t,x+2,y+2);
      c.fillStyle=col; c.fillText(t,x,y); c.textAlign="left";
    };
    if(this.state==="title"){
      const bounce=i=>Math.sin(this.time*3+i*.5)*6;
      const word="TREETOP RESCUE";
      c.font="bold 58px 'Trebuchet MS'"; c.textAlign="center";
      let tx=VW/2-c.measureText(word).width/2+20;
      c.textAlign="left";
      [...word].forEach((ch,i)=>{
        const wdt=c.measureText(ch).width;
        c.fillStyle="#00000066"; c.fillText(ch,tx+3,123+bounce(i));
        c.fillStyle=["#c1594a","#e3b258","#a9c98a","#8fbcab"][i%4];
        c.fillText(ch,tx,120+bounce(i)); tx+=wdt;
      });
      shadowText("Pip & the Glimmer Spirits",VW/2,158,"#fff",22,"center");
      const items=[
        {l:"NEW GAME",cb:()=>{this.pendingLevel=1;this.storyPage=0;this.state="story";this.audio.boot();}},
        ...(this.progress>1?[{l:"CONTINUE — LEVEL "+this.progress,cb:()=>{this.audio.boot();this.newRun(this.progress);}}]:[]),
        {l:"HIGH SCORES",cb:()=>{this.state="scores";}},
        {l:"SETTINGS",cb:()=>{this.state="settings";this.menuIdx=0;}}
      ];
      items.forEach((it,i)=>this.btn(c,VW/2-160,230+i*62,320,48,it.l,it.cb,i===this.menuIdx%items.length));
      this.menuNav(items);
      shadowText("ARROWS/WASD move · UP climb · SPACE jump · SHIFT sprint · X/F slingshot",VW/2,516,"#ffffffcc",14,"center");
    }
    else if(this.state==="scores"){
      this.drawTitleBG(c); this.panel(c,VW/2-240,80,480,380,"HIGH SCORES");
      c.font="bold 20px 'Trebuchet MS'";
      if(!this.scores.length){ shadowText("No climbs yet — be the first!",VW/2,240,"#fff",20,"center"); }
      this.scores.forEach((s,i)=>{
        shadowText((i+1)+".",VW/2-190,160+i*46,"#e3b258",22);
        shadowText(String(s.s).padStart(6,"0"),VW/2-140,160+i*46,"#fff",22);
        shadowText("LV "+s.l,VW/2+60,160+i*46,"#a9c98a",18);
        shadowText(s.d,VW/2+130,160+i*46,"#ffffff99",14);
      });
      const items=[{l:"BACK",cb:()=>{this.state="title";this.menuIdx=0;}}];
      this.btn(c,VW/2-90,392,180,46,"BACK",items[0].cb,true); this.menuNav(items);
    }
    else if(this.state==="settings"){
      if(this.world&&this.pausedFrom)this.drawWorld(c);
      else this.drawTitleBG(c);
      this.panel(c,VW/2-220,90,440,360,"SETTINGS");
      const T=v=>v?"ON":"OFF";
      const items=[
        {l:"SOUND EFFECTS: "+T(this.settings.sfx),cb:()=>{this.settings.sfx=!this.settings.sfx;this.audio.sfxOn=this.settings.sfx;Save.set("set",this.settings);}},
        {l:"MUSIC: "+T(this.settings.music),cb:()=>{this.settings.music=!this.settings.music;this.audio.musicOn=this.settings.music;Save.set("set",this.settings);}},
        {l:"SCREEN SHAKE: "+T(this.settings.shake),cb:()=>{this.settings.shake=!this.settings.shake;Save.set("set",this.settings);}},
        {l:"BACK",cb:()=>{this.state=this.pausedFrom?"paused":"title";this.pausedFrom=false;this.menuIdx=0;}}
      ];
      items.forEach((it,i)=>this.btn(c,VW/2-180,160+i*62,360,48,it.l,it.cb,i===this.menuIdx%items.length));
      this.menuNav(items);
    }
    else if(this.state==="story"){ /* drawn in drawStory */ }
    else if(this.state==="play"||this.state==="paused"){
      /* HUD */
      for(let i=0;i<Math.max(this.lives,0);i++){
        c.fillStyle="#c1594a";
        const x=28+i*26,y=26;
        c.beginPath(); c.arc(x-4,y-2,5,0,TAU); c.arc(x+4,y-2,5,0,TAU); c.fill();
        c.beginPath(); c.moveTo(x-9,y); c.lineTo(x,y+9); c.lineTo(x+9,y); c.fill();
      }
      shadowText(String(this.score).padStart(6,"0"),28,62,"#e3b258",22);
      shadowText("◔ "+this.coins,28,86,"#e3b258",15);
      /* slingshot ammo */
      c.fillStyle="#a97c3f"; c.beginPath(); c.arc(96,81,5,0,Math.PI); c.fill();
      c.fillStyle="#6e4a22"; rr(c,90,74,12,5,2); c.fill();
      shadowText("× "+this.player.ammo,108,86,this.player.ammo>0?"#c9a15c":"#c1594a",15);
      const mm=(this.levelTime/60)|0, ss=(this.levelTime%60)|0;
      shadowText("LV"+this.levelNum+"  "+this.world.spec.name,VW/2,28,"#fff",15,"center");
      shadowText(mm+":"+String(ss).padStart(2,"0"),VW/2,50,"#ffffffcc",14,"center");
      if(this.combo>1)shadowText("COMBO x"+this.combo,VW/2,74,"#8fbcab",18,"center");
      /* power-up timers */
      const p=this.player; let py=110;
      const bar=(label,frac,col)=>{ shadowText(label,28,py,col,12);
        c.fillStyle="#00000066"; rr(c,90,py-10,90,10,5); c.fill();
        c.fillStyle=col; rr(c,90,py-10,90*clamp(frac,0,1),10,5); c.fill(); py+=20; };
      if(p.spd>0)bar("SPEED",p.spd/8,"#cf7a3d");
      if(p.dj>0)bar("2×JUMP",p.dj/14,"#8fbcab");
      if(p.leaf>0)bar("INVINCIBLE",p.leaf/6,"#e3b258");
      if(this.slowT>0)bar("SLOW-MO",this.slowT/6,"#a698b3");
      if(p.shield)shadowText("SHIELD ✦",28,py,"#a9c98a",13);
      if(this.boss&&!this.boss.dead)this.boss.barDraw(c);
      shadowText("II",VW-40,34,"#ffffffaa",22);
      if(this.state==="paused"){
        c.fillStyle="#00000088"; c.fillRect(0,0,VW,VH);
        this.panel(c,VW/2-200,110,400,330,"PAUSED");
        const items=[
          {l:"RESUME",cb:()=>{this.state="play";}},
          {l:"RESTART LEVEL",cb:()=>{const s=this.score;this.startLevel(this.levelNum);this.score=s;}},
          {l:"SETTINGS",cb:()=>{this.pausedFrom=true;this.state="settings";this.menuIdx=0;}},
          {l:"QUIT TO TITLE",cb:()=>{this.state="title";this.menuIdx=0;this.audio.setSong(null);}}
        ];
        items.forEach((it,i)=>this.btn(c,VW/2-160,178+i*60,320,46,it.l,it.cb,i===this.menuIdx%items.length));
        this.menuNav(items);
        if(this.input.pressed("pause"))this.state="play";
      }
    }
    else if(this.state==="clear"){
      this.drawWorld(c);
      c.fillStyle="#00000077"; c.fillRect(0,0,VW,VH);
      this.panel(c,VW/2-230,110,460,320,"GLIMMER RESCUED!");
      shadowText(this.world.spec.name+" CLEAR",VW/2,180,"#a9c98a",20,"center");
      shadowText("TIME BONUS  +"+this.bonus.time,VW/2,230,"#fff",20,"center");
      shadowText("LIFE BONUS  +"+this.bonus.lives,VW/2,262,"#fff",20,"center");
      shadowText("SCORE  "+this.score,VW/2,310,"#e3b258",26,"center");
      if(this.stateT>1&&(this.time*2|0)%2===0)
        shadowText("PRESS JUMP FOR LEVEL "+(this.levelNum+1),VW/2,388,"#fff",17,"center");
      this.uiButtons.push({x:0,y:0,w:VW,h:VH,cb:()=>{if(this.stateT>1)this.startLevel(this.levelNum+1);}});
    }
    else if(this.state==="gameover"||this.state==="win"){
      if(this.world)this.drawWorld(c);
      c.fillStyle=this.state==="win"?"#16261ccc":"#000000aa"; c.fillRect(0,0,VW,VH);
      if(this.state==="win"){
        if((this.time*4|0)%3===0)this.particles.emit(Math.random()*VW,this.cam.y+Math.random()*200,
          {n:8,spd:220,grav:220,life:1.2,glow:true,color:["#c1594a","#e3b258","#a9c98a","#8fbcab"]});
        this.panel(c,VW/2-260,90,520,360,"FOREST SAVED!");
        shadowText("Every Glimmer shines free — Ratchet flees on foot!",VW/2,166,"#fff",18,"center");
      } else {
        this.panel(c,VW/2-260,90,520,360,"GAME OVER");
        shadowText("The tree will wait for your return, Pip.",VW/2,166,"#fff",18,"center");
      }
      shadowText("FINAL SCORE  "+this.score,VW/2,224,"#e3b258",30,"center");
      const best=this.scores[0]&&this.scores[0].s===this.score;
      if(best)shadowText("★ NEW BEST CLIMB! ★",VW/2,258,"#a9c98a",20,"center");
      const items=[
        {l:"PLAY AGAIN",cb:()=>this.newRun(1)},
        {l:"TITLE",cb:()=>{this.state="title";this.menuIdx=0;}}
      ];
      items.forEach((it,i)=>this.btn(c,VW/2-160,300+i*60,320,46,it.l,it.cb,i===this.menuIdx%items.length));
      this.menuNav(items);
    }
    /* achievement toasts */
    this.achQueue.forEach((a,i)=>{
      const y=90+i*64, alpha=clamp(Math.min(a.t,4-a.t)*2,0,1);
      c.globalAlpha=alpha;
      c.fillStyle="#16261cee"; rr(c,VW-300,y,280,54,12); c.fill();
      c.strokeStyle="#e3b258"; c.lineWidth=2; c.stroke();
      c.fillStyle="#e3b258"; c.font="bold 15px 'Trebuchet MS'";
      c.fillText("🏆 "+a.name,VW-286,y+22);
      c.fillStyle="#fff"; c.font="12px 'Trebuchet MS'";
      c.fillText(a.desc,VW-286,y+42);
      c.globalAlpha=1;
    });
  }
}

/* ---------------- boot + fixed-timestep loop ---------------- */
const G=new Game();
let last=performance.now(), acc=0;
function frame(t){
  acc+=Math.min((t-last)/1000,.1); last=t;
  const step=1/60;
  while(acc>=step){ G.update(step); acc-=step; }
  G.draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
addEventListener("keydown",()=>G.audio.boot(),{once:true});
/* debug/testing hook */
/* mobile: stop long-presses from triggering selection/callout menus */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("selectstart",e=>e.preventDefault());
document.addEventListener("touchstart",e=>{ if(e.target.closest&&e.target.closest("#touch"))e.preventDefault(); },{passive:false});

window.__TREETOP={G,buildLevel,Player,BossOwl,BossBeaver,BossGolem,BossRaccoon};
</script>
